<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PR CMU Dashboard — ระบบสรุปผลการดำเนินการ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; font-family: 'Noto Sans Thai', 'Outfit', sans-serif; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.2); border-radius: 3px; }
</style>

<!-- ★★★ ตรวจสอบสิทธิ์ทันที ก่อน React จะโหลด ★★★ -->
<script>
(function() {
  var allowed = false;
  try {
    var raw = localStorage.getItem('cc_pr_user');
    if (raw) {
      var user = JSON.parse(raw);
      if (user.username && user.displayName && user.role && user.loggedInAt) {
        var loginTime = new Date(user.loggedInAt).getTime();
        if (Date.now() - loginTime < 24 * 60 * 60 * 1000) {
          allowed = true;
        } else {
          localStorage.removeItem('cc_pr_user');
        }
      }
    }
  } catch(e) {}

  if (!allowed) {
    window.__AUTH_BLOCKED__ = true;
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('root').innerHTML =
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
        'background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);font-family:Noto Sans Thai,sans-serif">' +
        '<div style="background:rgba(30,41,59,0.9);border-radius:20px;padding:48px 40px;text-align:center;' +
        'max-width:440px;width:90%;border:1px solid rgba(148,163,184,0.15);box-shadow:0 25px 60px rgba(0,0,0,0.5)">' +
        '<div style="font-size:64px;margin-bottom:16px">&#128274;</div>' +
        '<h1 style="color:#f8fafc;font-size:22px;font-weight:700;margin-bottom:8px">\u0e44\u0e21\u0e48\u0e44\u0e14\u0e49\u0e23\u0e31\u0e1a\u0e2d\u0e19\u0e38\u0e0d\u0e32\u0e15</h1>' +
        '<p style="color:#94a3b8;font-size:15px;line-height:1.7;margin-bottom:28px">' +
        '\u0e01\u0e23\u0e38\u0e13\u0e32\u0e40\u0e02\u0e49\u0e32\u0e2a\u0e39\u0e48\u0e23\u0e30\u0e1a\u0e1a\u0e1c\u0e48\u0e32\u0e19\u0e2b\u0e19\u0e49\u0e32 Login \u0e01\u0e48\u0e2d\u0e19<br>' +
        '\u0e40\u0e1e\u0e37\u0e48\u0e2d\u0e40\u0e02\u0e49\u0e32\u0e43\u0e0a\u0e49\u0e07\u0e32\u0e19\u0e23\u0e30\u0e1a\u0e1a Dashboard</p>' +
        '<a href="index.html" style="display:inline-block;padding:14px 36px;border-radius:12px;' +
        'background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;text-decoration:none;' +
        'font-weight:600;font-size:15px;box-shadow:0 4px 20px rgba(124,58,237,0.4)">' +
        '\u0e44\u0e1b\u0e22\u0e31\u0e07\u0e2b\u0e19\u0e49\u0e32\u0e40\u0e02\u0e49\u0e32\u0e2a\u0e39\u0e48\u0e23\u0e30\u0e1a\u0e1a \u2192</a>' +
        '</div></div>';
    });
  }
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
if (window.__AUTH_BLOCKED__) throw new Error('auth');

const { useState, useEffect, useCallback, useRef } = React;

const MONTHS_TH = ["\u0e21\u0e01\u0e23\u0e32\u0e04\u0e21","\u0e01\u0e38\u0e21\u0e20\u0e32\u0e1e\u0e31\u0e19\u0e18\u0e4c","\u0e21\u0e35\u0e19\u0e32\u0e04\u0e21","\u0e40\u0e21\u0e29\u0e32\u0e22\u0e19","\u0e1e\u0e24\u0e29\u0e20\u0e32\u0e04\u0e21","\u0e21\u0e34\u0e16\u0e38\u0e19\u0e32\u0e22\u0e19","\u0e01\u0e23\u0e01\u0e0e\u0e32\u0e04\u0e21","\u0e2a\u0e34\u0e07\u0e2b\u0e32\u0e04\u0e21","\u0e01\u0e31\u0e19\u0e22\u0e32\u0e22\u0e19","\u0e15\u0e38\u0e25\u0e32\u0e04\u0e21","\u0e1e\u0e24\u0e28\u0e08\u0e34\u0e01\u0e32\u0e22\u0e19","\u0e18\u0e31\u0e19\u0e27\u0e32\u0e04\u0e21"];
const MONTHS_SHORT = ["\u0e21.\u0e04.","\u0e01.\u0e1e.","\u0e21\u0e35.\u0e04.","\u0e40\u0e21.\u0e22.","\u0e1e.\u0e04.","\u0e21\u0e34.\u0e22.","\u0e01.\u0e04.","\u0e2a.\u0e04.","\u0e01.\u0e22.","\u0e15.\u0e04.","\u0e1e.\u0e22.","\u0e18.\u0e04."];
const YEARS = [2568, 2569, 2570];
const MONTH_ICONS = ["\u2744\ufe0f","\ud83d\udc95","\ud83c\udf38","\u2600\ufe0f","\ud83c\udf27\ufe0f","\ud83c\udf08","\ud83c\udf3b","\u26c5","\ud83c\udf42","\ud83c\udf83","\ud83c\udf41","\ud83c\udf84"];

const STATUS_COLORS = {
  uploaded: { bg: "#dcfce7", text: "#166534", border: "#86efac", label: "\u0e2d\u0e31\u0e1b\u0e42\u0e2b\u0e25\u0e14\u0e41\u0e25\u0e49\u0e27" },
  pending:  { bg: "#fef9c3", text: "#854d0e", border: "#fde047", label: "\u0e23\u0e2d\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23" },
  empty:    { bg: "#f1f5f9", text: "#64748b", border: "#cbd5e1", label: "\u0e22\u0e31\u0e07\u0e44\u0e21\u0e48\u0e21\u0e35\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25" }
};

function getUser() {
  try { return JSON.parse(localStorage.getItem('cc_pr_user')); } catch(e) { return null; }
}

function generateDemoData() {
  const data = {};
  YEARS.forEach(y => {
    data[y] = {};
    MONTHS_TH.forEach((m, i) => {
      const rand = Math.random();
      data[y][m] = {
        status: rand > 0.6 ? "uploaded" : rand > 0.3 ? "pending" : "empty",
        fileName: rand > 0.6 ? `\u0e2a\u0e23\u0e38\u0e1b\u0e1c\u0e25_${MONTHS_SHORT[i]}${y}.pdf` : null,
        uploadDate: rand > 0.6 ? `${Math.floor(Math.random()*28+1)}/${i+1}/${y}` : null,
        fileSize: rand > 0.6 ? `${(Math.random()*5+0.5).toFixed(1)} MB` : null,
        summary: rand > 0.6 ? {
          totalRequests: Math.floor(Math.random()*50+10),
          completed: Math.floor(Math.random()*40+5),
          posters: Math.floor(Math.random()*20+2),
          videos: Math.floor(Math.random()*10+1),
          others: Math.floor(Math.random()*10),
        } : null
      };
    });
  });
  return data;
}

function StatCard({ icon, label, value, color, delay }) {
  return (
    <div style={{background:"rgba(30,41,59,0.7)",borderRadius:16,padding:"20px 24px",border:`1px solid ${color}22`,position:"relative",overflow:"hidden",animation:`fadeUp 0.5s ease ${delay}s both`,backdropFilter:"blur(10px)"}}>
      <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:`${color}10`}} />
      <div style={{fontSize:28,marginBottom:8}}>{icon}</div>
      <div style={{color:"#94a3b8",fontSize:12,fontWeight:500,letterSpacing:0.5,textTransform:"uppercase",marginBottom:4}}>{label}</div>
      <div style={{color:"#f8fafc",fontSize:28,fontWeight:800}}>{value}</div>
    </div>
  );
}

function MiniStat({ label, value }) {
  return (
    <div style={{background:"rgba(15,23,42,0.5)",borderRadius:8,padding:"8px 10px"}}>
      <div style={{color:"#64748b",fontSize:10,fontWeight:500,marginBottom:2}}>{label}</div>
      <div style={{color:"#e2e8f0",fontSize:18,fontWeight:700}}>{value}</div>
    </div>
  );
}

function MonthCard({ month, index, data, onOpenAdmin }) {
  const [hover, setHover] = useState(false);
  const status = STATUS_COLORS[data.status];
  return (
    <div style={{background:"rgba(30,41,59,0.6)",borderRadius:16,overflow:"hidden",border:hover?"1px solid rgba(124,58,237,0.3)":"1px solid rgba(148,163,184,0.1)",transition:"all 0.3s ease",cursor:"pointer",animation:`fadeUp 0.4s ease ${index*0.05}s both`,transform:hover?"translateY(-4px)":"translateY(0)",boxShadow:hover?"0 12px 40px rgba(0,0,0,0.3)":"none"}} onMouseOver={()=>setHover(true)} onMouseOut={()=>setHover(false)}>
      <div style={{padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(148,163,184,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>{MONTH_ICONS[index]}</span>
          <span style={{color:"#f8fafc",fontWeight:700,fontSize:16}}>{month}</span>
        </div>
        <span style={{fontSize:11,fontWeight:600,padding:"4px 12px",borderRadius:20,background:status.bg,color:status.text,border:`1px solid ${status.border}`}}>{status.label}</span>
      </div>
      <div style={{padding:"16px 20px"}}>
        {data.status==="uploaded"&&data.summary?(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <MiniStat label="\u0e04\u0e33\u0e02\u0e2d\u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14" value={data.summary.totalRequests} />
              <MiniStat label="\u0e40\u0e2a\u0e23\u0e47\u0e08\u0e2a\u0e34\u0e49\u0e19" value={data.summary.completed} />
              <MiniStat label="\u0e42\u0e1b\u0e2a\u0e40\u0e15\u0e2d\u0e23\u0e4c" value={data.summary.posters} />
              <MiniStat label="\u0e27\u0e34\u0e14\u0e35\u0e42\u0e2d" value={data.summary.videos} />
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,color:"#94a3b8",fontSize:11}}>
              <span>\ud83d\udcc4</span>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.fileName}</span>
              <span>{data.fileSize}</span>
            </div>
          </div>
        ):(
          <div style={{textAlign:"center",padding:"12px 0"}}>
            <p style={{color:"#64748b",fontSize:13,marginBottom:12}}>{data.status==="pending"?"\u0e2d\u0e22\u0e39\u0e48\u0e23\u0e30\u0e2b\u0e27\u0e48\u0e32\u0e07\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23":"\u0e22\u0e31\u0e07\u0e44\u0e21\u0e48\u0e21\u0e35\u0e44\u0e1f\u0e25\u0e4c\u0e2a\u0e23\u0e38\u0e1b\u0e1c\u0e25"}</p>
            <button onClick={(e)=>{e.stopPropagation();onOpenAdmin();}} style={{padding:"8px 20px",borderRadius:8,border:"1px solid rgba(124,58,237,0.3)",background:"rgba(124,58,237,0.1)",color:"#a78bfa",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>{"\u0e2d\u0e31\u0e1b\u0e42\u0e2b\u0e25\u0e14\u0e44\u0e1f\u0e25\u0e4c"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminPanel({ visible, onClose, reportData, setReportData, selectedYear }) {
  const [uploadMonth, setUploadMonth] = useState(0);
  const [dragOver, setDragOver] = useState(false);
  const [uploadSuccess, setUploadSuccess] = useState(null);
  const fileRef = useRef(null);
  const handleUpload = useCallback((files) => {
    if (!files||files.length===0) return;
    const file=files[0], monthName=MONTHS_TH[uploadMonth];
    setReportData(prev=>{const u=JSON.parse(JSON.stringify(prev));u[selectedYear][monthName]={status:"uploaded",fileName:file.name,uploadDate:new Date().toLocaleDateString("th-TH"),fileSize:`${(file.size/(1024*1024)).toFixed(1)} MB`,summary:{totalRequests:Math.floor(Math.random()*50+10),completed:Math.floor(Math.random()*40+5),posters:Math.floor(Math.random()*20+2),videos:Math.floor(Math.random()*10+1),others:Math.floor(Math.random()*10)}};return u;});
    setUploadSuccess(file.name);
    setTimeout(()=>setUploadSuccess(null),3000);
  },[uploadMonth,selectedYear,setReportData]);
  if(!visible)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.3s ease"}} onClick={onClose}>
      <div style={{background:"#1e293b",borderRadius:24,width:"90%",maxWidth:600,maxHeight:"90vh",overflow:"auto",border:"1px solid rgba(148,163,184,0.15)",boxShadow:"0 25px 60px rgba(0,0,0,0.5)",animation:"slideUp 0.4s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"24px 28px",borderBottom:"1px solid rgba(148,163,184,0.1)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><h2 style={{color:"#f8fafc",fontSize:20,fontWeight:700}}>{"\u2699\ufe0f \u0e41\u0e1c\u0e07\u0e04\u0e27\u0e1a\u0e04\u0e38\u0e21\u0e1c\u0e39\u0e49\u0e14\u0e39\u0e41\u0e25"}</h2><p style={{color:"#94a3b8",fontSize:13,marginTop:4}}>{"\u0e2d\u0e31\u0e1b\u0e42\u0e2b\u0e25\u0e14\u0e41\u0e25\u0e30\u0e08\u0e31\u0e14\u0e01\u0e32\u0e23\u0e44\u0e1f\u0e25\u0e4c\u0e2a\u0e23\u0e38\u0e1b\u0e1c\u0e25\u0e01\u0e32\u0e23\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23"}</p></div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(148,163,184,0.2)",background:"rgba(148,163,184,0.1)",color:"#94a3b8",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2715"}</button>
        </div>
        <div style={{padding:"24px 28px"}}>
          <div style={{background:"rgba(124,58,237,0.1)",borderRadius:12,padding:"12px 16px",marginBottom:20,border:"1px solid rgba(124,58,237,0.2)",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>{"\ud83d\udcc5"}</span><span style={{color:"#a78bfa",fontWeight:600,fontSize:14}}>{"\u0e1b\u0e35\u0e07\u0e1a\u0e1b\u0e23\u0e30\u0e21\u0e32\u0e13 "+selectedYear}</span>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{color:"#94a3b8",fontSize:13,fontWeight:600,display:"block",marginBottom:8}}>{"\u0e40\u0e25\u0e37\u0e2d\u0e01\u0e40\u0e14\u0e37\u0e2d\u0e19\u0e17\u0e35\u0e48\u0e15\u0e49\u0e2d\u0e07\u0e01\u0e32\u0e23\u0e2d\u0e31\u0e1b\u0e42\u0e2b\u0e25\u0e14"}</label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:6}}>
              {MONTHS_SHORT.map((m,i)=>(
                <button key={i} onClick={()=>setUploadMonth(i)} style={{padding:"10px 4px",borderRadius:10,border:uploadMonth===i?"1px solid #7c3aed":"1px solid rgba(148,163,184,0.15)",background:uploadMonth===i?"rgba(124,58,237,0.15)":"rgba(15,23,42,0.5)",color:uploadMonth===i?"#a78bfa":"#94a3b8",fontSize:13,fontWeight:uploadMonth===i?700:500,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>{MONTH_ICONS[i]+" "+m}</button>
              ))}
            </div>
          </div>
          <div onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);handleUpload(e.dataTransfer.files);}} onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${dragOver?"#7c3aed":"rgba(148,163,184,0.2)"}`,borderRadius:16,padding:"40px 20px",textAlign:"center",cursor:"pointer",background:dragOver?"rgba(124,58,237,0.08)":"rgba(15,23,42,0.4)",marginBottom:20,transition:"all 0.3s"}}>
            <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.xlsx,.xls,.png,.jpg,.jpeg" style={{display:"none"}} onChange={e=>handleUpload(e.target.files)} />
            <div style={{fontSize:48,marginBottom:12,opacity:0.8}}>{dragOver?"\ud83d\udce5":"\u2601\ufe0f"}</div>
            <p style={{color:"#e2e8f0",fontSize:15,fontWeight:600,marginBottom:4}}>{dragOver?"\u0e1b\u0e25\u0e48\u0e2d\u0e22\u0e44\u0e1f\u0e25\u0e4c\u0e17\u0e35\u0e48\u0e19\u0e35\u0e48":"\u0e04\u0e25\u0e34\u0e01\u0e2b\u0e23\u0e37\u0e2d\u0e25\u0e32\u0e01\u0e44\u0e1f\u0e25\u0e4c\u0e21\u0e32\u0e27\u0e32\u0e07\u0e17\u0e35\u0e48\u0e19\u0e35\u0e48"}</p>
            <p style={{color:"#64748b",fontSize:12}}>{"\u0e23\u0e2d\u0e07\u0e23\u0e31\u0e1a PDF, DOC, DOCX, XLSX, PNG, JPG (\u0e2a\u0e39\u0e07\u0e2a\u0e38\u0e14 25MB)"}</p>
          </div>
          {uploadSuccess&&(<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:10,marginBottom:20,animation:"fadeIn 0.3s ease"}}><span style={{fontSize:20}}>{"\u2705"}</span><div><p style={{color:"#4ade80",fontSize:14,fontWeight:600}}>{"\u0e2d\u0e31\u0e1b\u0e42\u0e2b\u0e25\u0e14\u0e2a\u0e33\u0e40\u0e23\u0e47\u0e08!"}</p><p style={{color:"#86efac",fontSize:12,marginTop:2}}>{uploadSuccess}</p></div></div>)}
          <h3 style={{color:"#e2e8f0",fontSize:15,fontWeight:700,marginBottom:12}}>{"\ud83d\udcc1 \u0e44\u0e1f\u0e25\u0e4c\u0e17\u0e35\u0e48\u0e2d\u0e31\u0e1b\u0e42\u0e2b\u0e25\u0e14\u0e41\u0e25\u0e49\u0e27 \u2014 \u0e1b\u0e35 "+selectedYear}</h3>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {MONTHS_TH.map((m,i)=>{const d=reportData[selectedYear][m];return(
              <div key={m} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,background:"rgba(15,23,42,0.5)",border:"1px solid rgba(148,163,184,0.08)"}}>
                <span style={{fontSize:16}}>{MONTH_ICONS[i]}</span>
                <span style={{color:"#cbd5e1",fontSize:13,fontWeight:600,minWidth:70}}>{MONTHS_SHORT[i]}</span>
                {d.status==="uploaded"?(<><span style={{color:"#94a3b8",fontSize:12,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.fileName}</span><span style={{color:"#64748b",fontSize:11}}>{d.fileSize}</span><button onClick={()=>{setReportData(prev=>{const u=JSON.parse(JSON.stringify(prev));u[selectedYear][m]={status:"empty",fileName:null,uploadDate:null,fileSize:null,summary:null};return u;});}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.1)",color:"#f87171",fontSize:11,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>{"\u0e25\u0e1a"}</button></>):(<span style={{fontSize:11,color:STATUS_COLORS[d.status].text,fontWeight:500,padding:"2px 10px",borderRadius:12,background:STATUS_COLORS[d.status].bg}}>{STATUS_COLORS[d.status].label}</span>)}
              </div>);})}
          </div>
        </div>
      </div>
    </div>
  );
}

function Dashboard() {
  const [reportData, setReportData] = useState(generateDemoData);
  const [selectedYear, setSelectedYear] = useState(2568);
  const [showAdmin, setShowAdmin] = useState(false);
  const [currentTime, setCurrentTime] = useState(new Date());
  const user = getUser();

  useEffect(()=>{const t=setInterval(()=>setCurrentTime(new Date()),1000);return()=>clearInterval(t);},[]);

  const yearData = reportData[selectedYear];
  const totalUploaded = Object.values(yearData).filter(d=>d.status==="uploaded").length;
  const totalPending = Object.values(yearData).filter(d=>d.status==="pending").length;
  const totalEmpty = Object.values(yearData).filter(d=>d.status==="empty").length;
  const totalRequests = Object.values(yearData).reduce((s,d)=>s+(d.summary?.totalRequests||0),0);
  const totalCompleted = Object.values(yearData).reduce((s,d)=>s+(d.summary?.completed||0),0);

  const handleLogout = () => { localStorage.removeItem("cc_pr_user"); window.location.href = "index.html"; };

  return (
    <div style={{minHeight:"100vh",fontFamily:"'Noto Sans Thai','Outfit',sans-serif",background:"#0f172a",color:"#f8fafc"}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,background:"radial-gradient(ellipse 800px 600px at 20% 20%,rgba(124,58,237,0.08) 0%,transparent 60%),radial-gradient(ellipse 600px 400px at 80% 80%,rgba(59,130,246,0.06) 0%,transparent 60%)"}} />
      <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(15,23,42,0.85)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(148,163,184,0.08)",padding:"0 24px"}}>
        <div style={{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:64}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:"#fff"}}>PR</div>
            <div><div style={{fontSize:15,fontWeight:700,color:"#f8fafc",lineHeight:1.2}}>PR CMU Dashboard</div><div style={{fontSize:11,color:"#64748b",fontWeight:500}}>{"\u0e23\u0e30\u0e1a\u0e1a\u0e2a\u0e23\u0e38\u0e1b\u0e1c\u0e25\u0e01\u0e32\u0e23\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23"}</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            {user&&(<div style={{textAlign:"right",marginRight:4}}><div style={{color:"#e2e8f0",fontSize:13,fontWeight:600}}>{user.displayName}</div><div style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,display:"inline-block",background:user.role==="head"?"rgba(233,69,96,0.15)":"rgba(78,204,163,0.15)",color:user.role==="head"?"#e94560":"#4ecca3",border:`1px solid ${user.role==="head"?"rgba(233,69,96,0.3)":"rgba(78,204,163,0.3)"}`}}>{user.roleLabel}</div></div>)}
            <div style={{color:"#64748b",fontSize:12,fontWeight:500,textAlign:"right"}}><div>{currentTime.toLocaleDateString("th-TH",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div><div style={{color:"#94a3b8",fontFamily:"Outfit"}}>{currentTime.toLocaleTimeString("th-TH")}</div></div>
            <button onClick={()=>setShowAdmin(true)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(124,58,237,0.3)",background:"rgba(124,58,237,0.1)",color:"#a78bfa",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>{"\u2699\ufe0f \u0e41\u0e1c\u0e07\u0e04\u0e27\u0e1a\u0e04\u0e38\u0e21"}</button>
            <button onClick={handleLogout} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>{"\ud83d\udeaa \u0e2d\u0e2d\u0e01\u0e08\u0e32\u0e01\u0e23\u0e30\u0e1a\u0e1a"}</button>
          </div>
        </div>
      </nav>

      <div style={{maxWidth:1280,margin:"0 auto",padding:"32px 24px",position:"relative",zIndex:1}}>
        <div style={{marginBottom:32,animation:"fadeUp 0.5s ease"}}><h1 style={{fontSize:32,fontWeight:900,marginBottom:6,letterSpacing:-0.5}}>{"\u0e20\u0e32\u0e1e\u0e23\u0e27\u0e21\u0e1c\u0e25\u0e01\u0e32\u0e23\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e07\u0e32\u0e19"}</h1><p style={{color:"#94a3b8",fontSize:15}}>{"\u0e2a\u0e23\u0e38\u0e1b\u0e23\u0e32\u0e22\u0e07\u0e32\u0e19\u0e1c\u0e25\u0e01\u0e32\u0e23\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23\u0e1b\u0e23\u0e30\u0e0a\u0e32\u0e2a\u0e31\u0e21\u0e1e\u0e31\u0e19\u0e18\u0e4c \u0e21\u0e2b\u0e32\u0e27\u0e34\u0e17\u0e22\u0e32\u0e25\u0e31\u0e22\u0e40\u0e0a\u0e35\u0e22\u0e07\u0e43\u0e2b\u0e21\u0e48"}</p></div>

        <div style={{display:"flex",gap:6,marginBottom:28,background:"rgba(30,41,59,0.5)",borderRadius:14,padding:4,width:"fit-content",border:"1px solid rgba(148,163,184,0.08)"}}>
          {YEARS.map(y=>(<button key={y} onClick={()=>setSelectedYear(y)} style={{padding:"10px 28px",borderRadius:10,border:"none",background:selectedYear===y?"linear-gradient(135deg,#7c3aed,#6d28d9)":"transparent",color:selectedYear===y?"#fff":"#94a3b8",fontSize:15,fontWeight:selectedYear===y?700:500,cursor:"pointer",transition:"all 0.3s",boxShadow:selectedYear===y?"0 4px 16px rgba(124,58,237,0.3)":"none",fontFamily:"'Noto Sans Thai','Outfit',sans-serif"}}>{"\u0e1b\u0e35 \u0e1e.\u0e28. "+y}</button>))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))",gap:16,marginBottom:32}}>
          <StatCard icon={"\ud83d\udcca"} label={"\u0e04\u0e33\u0e02\u0e2d\u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14"} value={totalRequests} color="#7c3aed" delay={0.1} />
          <StatCard icon={"\u2705"} label={"\u0e40\u0e2a\u0e23\u0e47\u0e08\u0e2a\u0e34\u0e49\u0e19"} value={totalCompleted} color="#22c55e" delay={0.15} />
          <StatCard icon={"\ud83d\udcc1"} label={"\u0e2d\u0e31\u0e1b\u0e42\u0e2b\u0e25\u0e14\u0e41\u0e25\u0e49\u0e27"} value={`${totalUploaded}/12`} color="#3b82f6" delay={0.2} />
          <StatCard icon={"\u23f3"} label={"\u0e23\u0e2d\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23"} value={totalPending} color="#eab308" delay={0.25} />
          <StatCard icon={"\ud83d\udced"} label={"\u0e22\u0e31\u0e07\u0e44\u0e21\u0e48\u0e21\u0e35\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25"} value={totalEmpty} color="#64748b" delay={0.3} />
        </div>

        <div style={{background:"rgba(30,41,59,0.7)",borderRadius:16,padding:"20px 24px",marginBottom:32,border:"1px solid rgba(148,163,184,0.1)",animation:"fadeUp 0.5s ease 0.35s both"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{color:"#e2e8f0",fontSize:14,fontWeight:600}}>{"\u0e04\u0e27\u0e32\u0e21\u0e04\u0e37\u0e1a\u0e2b\u0e19\u0e49\u0e32\u0e01\u0e32\u0e23\u0e23\u0e32\u0e22\u0e07\u0e32\u0e19\u0e1c\u0e25 \u0e1b\u0e35 "+selectedYear}</span>
            <span style={{color:"#a78bfa",fontSize:14,fontWeight:700}}>{Math.round((totalUploaded/12)*100)+"%"}</span>
          </div>
          <div style={{height:10,borderRadius:5,background:"rgba(15,23,42,0.6)",overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:5,background:"linear-gradient(90deg,#7c3aed,#3b82f6)",width:`${(totalUploaded/12)*100}%`,transition:"width 0.8s ease",boxShadow:"0 0 12px rgba(124,58,237,0.4)"}} />
          </div>
        </div>

        <div style={{marginBottom:20,display:"flex",alignItems:"center",gap:10,animation:"fadeUp 0.5s ease 0.4s both"}}><h2 style={{fontSize:20,fontWeight:800,color:"#f8fafc"}}>{"\ud83d\udccb \u0e23\u0e32\u0e22\u0e07\u0e32\u0e19\u0e23\u0e32\u0e22\u0e40\u0e14\u0e37\u0e2d\u0e19"}</h2><div style={{flex:1,height:1,background:"rgba(148,163,184,0.1)"}} /></div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))",gap:16,marginBottom:40}}>
          {MONTHS_TH.map((month,i)=>(<MonthCard key={`${selectedYear}-${month}`} month={month} index={i} data={yearData[month]} onOpenAdmin={()=>setShowAdmin(true)} />))}
        </div>

        <div style={{textAlign:"center",padding:"24px 0",borderTop:"1px solid rgba(148,163,184,0.08)",color:"#475569",fontSize:12}}>
          <p>{"\u0e07\u0e32\u0e19\u0e1b\u0e23\u0e30\u0e0a\u0e32\u0e2a\u0e31\u0e21\u0e1e\u0e31\u0e19\u0e18\u0e4c \u0e21\u0e2b\u0e32\u0e27\u0e34\u0e17\u0e22\u0e32\u0e25\u0e31\u0e22\u0e40\u0e0a\u0e35\u0e22\u0e07\u0e43\u0e2b\u0e21\u0e48 \u2022 PR CMU Dashboard v1.0"}</p>
          <p style={{marginTop:4}}>{"© "+new Date().getFullYear()+" \u0e2a\u0e07\u0e27\u0e19\u0e25\u0e34\u0e02\u0e2a\u0e34\u0e17\u0e18\u0e34\u0e4c"}</p>
        </div>
      </div>
      <AdminPanel visible={showAdmin} onClose={()=>setShowAdmin(false)} reportData={reportData} setReportData={setReportData} selectedYear={selectedYear} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
