<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PR CMUL Dashboard — ระบบสรุปผลการดำเนินการ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0f172a;font-family:'Noto Sans Thai','Outfit',sans-serif;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.2);border-radius:3px;}
</style>
<script>
(function(){
  var allowed=false;
  var TIMEOUT_MS=30*60*1000; // ★ 30 นาที
  try{
    var raw=localStorage.getItem('cc_pr_user');
    if(raw){var user=JSON.parse(raw);
      if(user.username&&user.displayName&&user.role&&user.loggedInAt){
        // เช็ค login ไม่เกิน 24 ชม.
        if(Date.now()-new Date(user.loggedInAt).getTime()<24*60*60*1000){
          // ★ เช็ค lastActivity ไม่เกิน 30 นาที
          var lastAct=localStorage.getItem('cc_pr_lastActivity');
          if(lastAct&&(Date.now()-parseInt(lastAct,10))>TIMEOUT_MS){
            // หมดเวลา — ลบข้อมูลทั้งหมด
            localStorage.removeItem('cc_pr_user');
            localStorage.removeItem('cc_pr_lastActivity');
          } else {
            // ยังไม่หมดเวลา — อัปเดต activity
            localStorage.setItem('cc_pr_lastActivity',Date.now().toString());
            allowed=true;
          }
        } else {
          localStorage.removeItem('cc_pr_user');
          localStorage.removeItem('cc_pr_lastActivity');
        }
      }
    }
  }catch(e){}
  if(!allowed){
    window.__AUTH_BLOCKED__=true;
    // ★ เช็คว่าหมดเวลาหรือไม่เคย login
    var wasTimeout=false;
    try{var r=localStorage.getItem('cc_pr_user');if(!r){var la=document.referrer;if(la.indexOf('dashboard')>-1)wasTimeout=true;}}catch(e){}
    document.addEventListener('DOMContentLoaded',function(){
      document.getElementById('root').innerHTML=
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);font-family:Noto Sans Thai,sans-serif">'+
        '<div style="background:rgba(30,41,59,0.9);border-radius:20px;padding:48px 40px;text-align:center;max-width:440px;width:90%;border:1px solid rgba(148,163,184,0.15);box-shadow:0 25px 60px rgba(0,0,0,0.5)">'+
        '<div style="font-size:64px;margin-bottom:16px">&#128274;</div>'+
        '<h1 style="color:#f8fafc;font-size:22px;font-weight:700;margin-bottom:8px">ไม่ได้รับอนุญาต</h1>'+
        '<p style="color:#94a3b8;font-size:15px;line-height:1.7;margin-bottom:28px">กรุณาเข้าสู่ระบบผ่านหน้า Login ก่อน<br>เพื่อเข้าใช้งานระบบ Dashboard</p>'+
        '<a href="index.html" style="display:inline-block;padding:14px 36px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 20px rgba(124,58,237,0.4)">ไปยังหน้าเข้าสู่ระบบ →</a>'+
        '</div></div>';
    });
  }
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
if(window.__AUTH_BLOCKED__) throw new Error('auth');

const{useState,useEffect,useCallback,useRef}=React;

const MONTHS_TH=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const MONTHS_SHORT=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const YEARS=[2568,2569,2570];
const MONTH_ICONS=["❄️","💕","🌸","☀️","🌧️","🌈","🌻","⛅","🍂","🎃","🍁","🎄"];

const STATUS_COLORS={
  uploaded:{bg:"#dcfce7",text:"#166534",border:"#86efac",label:"รายงานแล้ว"},
  pending:{bg:"#fef9c3",text:"#854d0e",border:"#fde047",label:"ยังไม่ได้ดำเนินการ"},
  empty:{bg:"#f1f5f9",text:"#64748b",border:"#cbd5e1",label:"ยังไม่มีข้อมูล"}
};

function getUser(){try{return JSON.parse(localStorage.getItem('cc_pr_user'));}catch(e){return null;}}

// ★ ข้อมูลลิงก์ embed ของแต่ละเดือน — แก้ไข URL ได้ที่นี่
function getDefaultEmbedData(){
  const data={};
  YEARS.forEach(y=>{
    data[y]={};
    MONTHS_TH.forEach((m,i)=>{
      data[y][m]={
        embedUrl:"",      // ← ลิงก์เว็บไซต์ที่ต้องการ embed
        fileName:null,    // ← ชื่อไฟล์ที่อัปโหลด
        fileSize:null,    // ← ขนาดไฟล์
        uploadDate:null,  // ← วันที่อัปโหลด
        status:"empty"
      };
    });
  });
  return data;
}

function StatCard({icon,label,value,color,delay}){
  return(
    <div style={{background:"rgba(30,41,59,0.7)",borderRadius:16,padding:"20px 24px",border:`1px solid ${color}22`,position:"relative",overflow:"hidden",animation:`fadeUp 0.5s ease ${delay}s both`,backdropFilter:"blur(10px)"}}>
      <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:`${color}10`}} />
      <div style={{fontSize:28,marginBottom:8}}>{icon}</div>
      <div style={{color:"#94a3b8",fontSize:11,fontWeight:500,marginBottom:4,lineHeight:1.4}}>{label}</div>
      <div style={{color:"#f8fafc",fontSize:28,fontWeight:800}}>{value}</div>
    </div>
  );
}

function MonthCard({month,index,data,onOpenAdmin,canAdmin}){
  const [hover,setHover]=useState(false);
  const status=STATUS_COLORS[data.status];
  const hasEmbed=data.embedUrl&&data.embedUrl.trim()!=="";
  const hasFile=data.fileName;
  const hasContent=hasEmbed||hasFile;

  return(
    <div style={{background:"rgba(30,41,59,0.6)",borderRadius:16,overflow:"hidden",border:hover?"1px solid rgba(124,58,237,0.3)":"1px solid rgba(148,163,184,0.1)",transition:"all 0.3s ease",animation:`fadeUp 0.4s ease ${index*0.05}s both`,transform:hover?"translateY(-4px)":"translateY(0)",boxShadow:hover?"0 12px 40px rgba(0,0,0,0.3)":"none"}} onMouseOver={()=>setHover(true)} onMouseOut={()=>setHover(false)}>
      {/* Header */}
      <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(148,163,184,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20}}>{MONTH_ICONS[index]}</span>
          <span style={{color:"#f8fafc",fontWeight:700,fontSize:15}}>{month}</span>
        </div>
        <span style={{fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:20,background:status.bg,color:status.text,border:`1px solid ${status.border}`}}>{status.label}</span>
      </div>

      {/* Content */}
      <div style={{padding:"14px 18px"}}>
        {hasContent?(
          <div>
            {/* Iframe preview */}
            {hasEmbed&&(
              <div style={{marginBottom:10}}>
                <div style={{borderRadius:10,overflow:"hidden",border:"1px solid rgba(148,163,184,0.15)",background:"#0f172a",position:"relative",height:150}}>
                  <iframe src={data.embedUrl} style={{width:"100%",height:"100%",border:"none",borderRadius:10,pointerEvents:"none"}} title={month} loading="lazy" sandbox="allow-scripts allow-same-origin" />
                  <div style={{position:"absolute",inset:0,background:"transparent"}} />
                </div>
                <a href={data.embedUrl} target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",padding:"8px 16px",borderRadius:8,marginTop:8,background:"rgba(124,58,237,0.12)",border:"1px solid rgba(124,58,237,0.25)",color:"#a78bfa",fontSize:12,fontWeight:600,textDecoration:"none",fontFamily:"'Noto Sans Thai', sans-serif"}}>
                  🔗 แสดงผลฉบับเต็ม (เปิดแท็บใหม่)
                </a>
              </div>
            )}

            {/* Uploaded file info */}
            {hasFile&&(
              <div style={{padding:"10px 12px",borderRadius:8,background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.15)",marginTop:hasEmbed?8:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:14}}>📄</span>
                  <span style={{color:"#86efac",fontSize:12,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.fileName}</span>
                  <span style={{color:"#4ade80",fontSize:11,whiteSpace:"nowrap"}}>{data.fileSize}</span>
                </div>
                {data.cloudinaryUrl&&(
                  <a href={data.cloudinaryUrl} target="_blank" rel="noopener noreferrer"
                    style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,color:"#60a5fa",fontSize:11,textDecoration:"none",fontWeight:500}}>
                    ☁️ ดูไฟล์บน Cloud →
                  </a>
                )}
              </div>
            )}
          </div>
        ):(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <p style={{color:"#64748b",fontSize:13,marginBottom:12}}>
              {data.status==="pending"?"อยู่ระหว่างดำเนินการ":"ยังไม่มีข้อมูลรายงาน"}
            </p>
            {canAdmin&&(
              <button onClick={(e)=>{e.stopPropagation();onOpenAdmin();}} style={{padding:"8px 20px",borderRadius:8,border:"1px solid rgba(124,58,237,0.3)",background:"rgba(124,58,237,0.1)",color:"#a78bfa",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>
                เพิ่มลิงก์ / อัปโหลดไฟล์
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function AdminPanel({visible,onClose,reportData,setReportData,selectedYear}){
  const [editMonth,setEditMonth]=useState(0);
  const [urlInput,setUrlInput]=useState("");
  const [statusInput,setStatusInput]=useState("uploaded");
  const [saveMsg,setSaveMsg]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const [uploadSuccess,setUploadSuccess]=useState(null);
  const [uploading,setUploading]=useState(false);
  const [uploadError,setUploadError]=useState(null);
  const fileRef=useRef(null);

  // ★ Cloudinary config
  const CLOUD_NAME="dpyhc69jg";
  const UPLOAD_PRESET="pr_cmul_upload"; // ← ต้องสร้าง unsigned upload preset ชื่อนี้ใน Cloudinary

  // ★ อัปโหลดไฟล์ไป Cloudinary
  const handleUpload=useCallback(async(files)=>{
    if(!files||files.length===0)return;
    const file=files[0];
    const monthName=MONTHS_TH[editMonth];

    // เช็คขนาดไฟล์ (25MB)
    if(file.size>25*1024*1024){
      setUploadError("ไฟล์ใหญ่เกิน 25MB กรุณาเลือกไฟล์ที่เล็กกว่า");
      setTimeout(()=>setUploadError(null),4000);
      return;
    }

    setUploading(true);
    setUploadError(null);

    try{
      // สร้าง FormData สำหรับ Cloudinary
      const formData=new FormData();
      formData.append("file",file);
      formData.append("upload_preset",UPLOAD_PRESET);
      formData.append("folder",`pr_cmul/${selectedYear}/${MONTHS_SHORT[editMonth]}`);

      const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,{
        method:"POST",
        body:formData
      });

      if(!res.ok){
        const err=await res.json().catch(()=>({}));
        throw new Error(err.error?.message||"อัปโหลดล้มเหลว");
      }

      const data=await res.json();

      // บันทึกข้อมูลไฟล์ + ลิงก์ Cloudinary
      setReportData(prev=>{
        const u=JSON.parse(JSON.stringify(prev));
        u[selectedYear][monthName]={
          ...u[selectedYear][monthName],
          status:"uploaded",
          fileName:file.name,
          fileSize:`${(file.size/(1024*1024)).toFixed(1)} MB`,
          uploadDate:new Date().toLocaleDateString("th-TH"),
          cloudinaryUrl:data.secure_url,
          cloudinaryId:data.public_id
        };
        return u;
      });

      setUploadSuccess(file.name);
      setTimeout(()=>setUploadSuccess(null),3000);

    }catch(err){
      console.error("Cloudinary upload error:",err);
      setUploadError(err.message||"เกิดข้อผิดพลาดในการอัปโหลด กรุณาลองใหม่");
      setTimeout(()=>setUploadError(null),5000);
    }finally{
      setUploading(false);
    }
  },[editMonth,selectedYear,setReportData]);

  // ★ บันทึกลิงก์ embed
  const handleSave=()=>{
    const monthName=MONTHS_TH[editMonth];
    setReportData(prev=>{
      const u=JSON.parse(JSON.stringify(prev));
      u[selectedYear][monthName]={
        ...u[selectedYear][monthName],
        embedUrl:urlInput.trim(),
        status:urlInput.trim()?statusInput:(u[selectedYear][monthName].fileName?"uploaded":"empty")
      };
      return u;
    });
    setSaveMsg(monthName);
    setTimeout(()=>setSaveMsg(null),2500);
  };

  const handleDelete=(m)=>{
    setReportData(prev=>{
      const u=JSON.parse(JSON.stringify(prev));
      u[selectedYear][m]={embedUrl:"",status:"empty",fileName:null,fileSize:null,uploadDate:null};
      return u;
    });
  };

  useEffect(()=>{
    if(visible){
      const monthName=MONTHS_TH[editMonth];
      const d=reportData[selectedYear][monthName];
      setUrlInput(d.embedUrl||"");
      setStatusInput(d.status==="empty"?"uploaded":d.status);
    }
  },[visible,editMonth,selectedYear]);

  if(!visible)return null;

  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.3s ease"}} onClick={onClose}>
      <div style={{background:"#1e293b",borderRadius:24,width:"90%",maxWidth:640,maxHeight:"90vh",overflow:"auto",border:"1px solid rgba(148,163,184,0.15)",boxShadow:"0 25px 60px rgba(0,0,0,0.5)",animation:"slideUp 0.4s ease"}} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{padding:"24px 28px",borderBottom:"1px solid rgba(148,163,184,0.1)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><h2 style={{color:"#f8fafc",fontSize:20,fontWeight:700}}>⚙️ แผงควบคุมผู้ดูแล</h2><p style={{color:"#94a3b8",fontSize:13,marginTop:4}}>จัดการลิงก์รายงาน + อัปโหลดไฟล์สรุปผล</p></div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(148,163,184,0.2)",background:"rgba(148,163,184,0.1)",color:"#94a3b8",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        <div style={{padding:"24px 28px"}}>

          {/* ปีงบประมาณ */}
          <div style={{background:"rgba(124,58,237,0.1)",borderRadius:12,padding:"12px 16px",marginBottom:20,border:"1px solid rgba(124,58,237,0.2)",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>📅</span><span style={{color:"#a78bfa",fontWeight:600,fontSize:14}}>ปีงบประมาณ {selectedYear}</span>
          </div>

          {/* เลือกเดือน */}
          <div style={{marginBottom:24}}>
            <label style={{color:"#94a3b8",fontSize:13,fontWeight:600,display:"block",marginBottom:8}}>เลือกเดือนที่ต้องการแก้ไข</label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:6}}>
              {MONTHS_SHORT.map((m,i)=>{
                const d=reportData[selectedYear][MONTHS_TH[i]];
                const hasData=(d.embedUrl&&d.embedUrl.trim()!=="")||d.fileName;
                return(
                  <button key={i} onClick={()=>setEditMonth(i)} style={{padding:"10px 4px",borderRadius:10,position:"relative",
                    border:editMonth===i?"1px solid #7c3aed":"1px solid rgba(148,163,184,0.15)",
                    background:editMonth===i?"rgba(124,58,237,0.15)":"rgba(15,23,42,0.5)",
                    color:editMonth===i?"#a78bfa":"#94a3b8",fontSize:13,fontWeight:editMonth===i?700:500,
                    cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"
                  }}>
                    {MONTH_ICONS[i]} {m}
                    {hasData&&<span style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:"#22c55e"}} />}
                  </button>
                );
              })}
            </div>
          </div>

          {/* ═══════════ ส่วนที่ 1: ฝังลิงก์เว็บไซต์ ═══════════ */}
          <div style={{background:"rgba(15,23,42,0.4)",borderRadius:16,padding:"20px",marginBottom:20,border:"1px solid rgba(148,163,184,0.08)"}}>
            <h3 style={{color:"#e2e8f0",fontSize:14,fontWeight:700,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16}}>🔗</span> ฝังลิงก์เว็บไซต์รายงาน
            </h3>
            <input value={urlInput} onChange={e=>setUrlInput(e.target.value)}
              placeholder="วางลิงก์ที่นี่ เช่น https://docs.google.com/..."
              style={{width:"100%",padding:"12px 16px",borderRadius:10,border:"1px solid rgba(148,163,184,0.2)",
                background:"rgba(15,23,42,0.6)",color:"#e2e8f0",fontSize:14,outline:"none",
                fontFamily:"'Noto Sans Thai','Outfit',sans-serif",marginBottom:12}} />
            <p style={{color:"#64748b",fontSize:11,marginBottom:0}}>
              รองรับ Google Docs, Google Sheets, Canva, เว็บไซต์อื่นๆ — จะแสดงตัวอย่างเล็กๆ ในหน้ารายงานรายเดือน
            </p>
          </div>

          {/* ═══════════ ส่วนที่ 2: อัปโหลดไฟล์ไป Cloudinary ═══════════ */}
          <div style={{background:"rgba(15,23,42,0.4)",borderRadius:16,padding:"20px",marginBottom:20,border:"1px solid rgba(148,163,184,0.08)"}}>
            <h3 style={{color:"#e2e8f0",fontSize:14,fontWeight:700,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16}}>📎</span> อัปโหลดไฟล์สรุปผลไป Cloud
            </h3>
            <p style={{color:"#64748b",fontSize:11,marginBottom:14}}>ไฟล์จะถูกอัปโหลดไปยัง Cloudinary โดยอัตโนมัติ</p>

            {uploading?(
              <div style={{border:"2px dashed rgba(124,58,237,0.3)",borderRadius:12,padding:"32px 16px",textAlign:"center",background:"rgba(124,58,237,0.05)"}}>
                <div style={{fontSize:36,marginBottom:8,animation:"spin 1s linear infinite"}}>⟳</div>
                <p style={{color:"#a78bfa",fontSize:14,fontWeight:600}}>กำลังอัปโหลดไป Cloudinary...</p>
                <p style={{color:"#64748b",fontSize:12,marginTop:4}}>กรุณารอสักครู่</p>
              </div>
            ):(
              <div
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={e=>{e.preventDefault();setDragOver(false);handleUpload(e.dataTransfer.files);}}
                onClick={()=>fileRef.current?.click()}
                style={{border:`2px dashed ${dragOver?"#7c3aed":"rgba(148,163,184,0.2)"}`,borderRadius:12,
                  padding:"28px 16px",textAlign:"center",cursor:"pointer",
                  background:dragOver?"rgba(124,58,237,0.08)":"rgba(15,23,42,0.3)",
                  transition:"all 0.3s"}}>
                <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.xlsx,.xls,.pptx,.png,.jpg,.jpeg" style={{display:"none"}}
                  onChange={e=>handleUpload(e.target.files)} />
                <div style={{fontSize:36,marginBottom:8,opacity:0.8}}>{dragOver?"📥":"☁️"}</div>
                <p style={{color:"#e2e8f0",fontSize:14,fontWeight:600,marginBottom:4}}>
                  {dragOver?"ปล่อยไฟล์ที่นี่":"คลิกหรือลากไฟล์มาวางที่นี่"}
                </p>
                <p style={{color:"#64748b",fontSize:11}}>
                  รองรับ PDF, DOC, DOCX, XLSX, PPTX, PNG, JPG (สูงสุด 25MB)
                </p>

function getPermissions(){
  try{const raw=localStorage.getItem('cc_pr_permissions');return raw?JSON.parse(raw):null;}catch(e){return null;}
}
function savePermissions(p){localStorage.setItem('cc_pr_permissions',JSON.stringify(p));}

function PermissionsPanel({visible,onClose}){
  const [accounts,setAccounts]=useState(()=>getPermissions()||DEFAULT_ACCOUNTS);
  const [newUsername,setNewUsername]=useState("");
  const [newDisplay,setNewDisplay]=useState("");
  const [newRole,setNewRole]=useState("viewer");
  const [newPassword,setNewPassword]=useState("");
  const [addMsg,setAddMsg]=useState(null);

  const handleRoleChange=(username,newR)=>{
    if(username==='thian')return; // ห้ามเปลี่ยน thian
    setAccounts(prev=>{
      const u={...prev};
      u[username]={...u[username],role:newR,roleLabel:ROLE_OPTIONS.find(r=>r.value===newR)?.label||newR};
      savePermissions(u);
      return u;
    });
  };

  const handleRemove=(username)=>{
    if(username==='thian')return;
    setAccounts(prev=>{
      const u={...prev};
      delete u[username];
      savePermissions(u);
      return u;
    });
  };

  const handleAdd=()=>{
    const un=newUsername.trim().toLowerCase();
    if(!un||!newDisplay.trim()||!newPassword.trim()){setAddMsg("กรุณากรอกข้อมูลให้ครบ");setTimeout(()=>setAddMsg(null),3000);return;}
    if(accounts[un]){setAddMsg("ชื่อผู้ใช้นี้มีอยู่แล้ว");setTimeout(()=>setAddMsg(null),3000);return;}
    setAccounts(prev=>{
      const u={...prev};
      u[un]={displayName:newDisplay.trim(),role:newRole,roleLabel:ROLE_OPTIONS.find(r=>r.value===newRole)?.label||newRole,password:newPassword.trim()};
      savePermissions(u);
      // อัปเดต accounts ในหน้า login ด้วย
      localStorage.setItem('cc_pr_custom_accounts',JSON.stringify(u));
      return u;
    });
    setNewUsername("");setNewDisplay("");setNewPassword("");setNewRole("viewer");
    setAddMsg("เพิ่มผู้ใช้สำเร็จ!");
    setTimeout(()=>setAddMsg(null),2500);
  };

  if(!visible)return null;

  return(
    <div style={{position:"fixed",inset:0,zIndex:1100,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(10px)",display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.3s ease"}} onClick={onClose}>

          </div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(148,163,184,0.2)",background:"rgba(148,163,184,0.1)",color:"#94a3b8",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>

        <div style={{padding:"24px 28px"}}>

                  </div>

              );
            })}
          </div>

          {/* เพิ่มผู้ใช้ใหม่ */}
          <div style={{background:"rgba(15,23,42,0.4)",borderRadius:16,padding:"20px",border:"1px solid rgba(148,163,184,0.08)"}}>

              <input value={newDisplay} onChange={e=>setNewDisplay(e.target.value)} placeholder="ชื่อที่แสดง"
                style={{padding:"10px 14px",borderRadius:8,border:"1px solid rgba(148,163,184,0.2)",background:"rgba(15,23,42,0.6)",color:"#e2e8f0",fontSize:13,outline:"none",fontFamily:"'Noto Sans Thai','Outfit',sans-serif"}} />

              <select value={newRole} onChange={e=>setNewRole(e.target.value)}

function Dashboard(){
  const [reportData,setReportData]=useState(getDefaultEmbedData);
  const [selectedYear,setSelectedYear]=useState(2568);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showPermissions,setShowPermissions]=useState(false);
  const [currentTime,setCurrentTime]=useState(new Date());
  const [sessionExpired,setSessionExpired]=useState(false);
  const [warningCountdown,setWarningCountdown]=useState(null);
  const user=getUser();

  const TIMEOUT_MS=30*60*1000; // 30 นาที
  const WARNING_MS=2*60*1000;  // แจ้งเตือนล่วงหน้า 2 นาที

  // ★ ระบบติดตาม activity + หมดเวลาอัตโนมัติ
  useEffect(()=>{
    function updateActivity(){
      localStorage.setItem('cc_pr_lastActivity',Date.now().toString());
      setWarningCountdown(null); // ซ่อน warning ถ้ามีการใช้งาน
    }
    // ติดตามทุกการกระทำของผู้ใช้
    const events=['mousemove','mousedown','keydown','scroll','touchstart','click'];
    events.forEach(ev=>window.addEventListener(ev,updateActivity,{passive:true}));
    updateActivity(); // เซ็ตค่าเริ่มต้น

    // เช็คทุก 10 วินาทีว่าหมดเวลาหรือยัง
    const checker=setInterval(()=>{
      const last=parseInt(localStorage.getItem('cc_pr_lastActivity')||'0',10);
      const elapsed=Date.now()-last;
      const remaining=TIMEOUT_MS-elapsed;

      if(remaining<=0){
        // ★ หมดเวลา!
        clearInterval(checker);
        localStorage.removeItem('cc_pr_user');
        localStorage.removeItem('cc_pr_lastActivity');
        setSessionExpired(true);
      } else if(remaining<=WARNING_MS&&remaining>0){
        // ★ แจ้งเตือนก่อนหมดเวลา
        setWarningCountdown(Math.ceil(remaining/1000));
      } else {
        setWarningCountdown(null);
      }
    },10000);

    return()=>{
      events.forEach(ev=>window.removeEventListener(ev,updateActivity));
      clearInterval(checker);
    };
  },[]);

  // ★ สิทธิ์: admin เท่านั้นที่เข้าแผงควบคุมได้ (apinanun.s, thian)
  const canAdmin=user&&user.role==="admin";
  // ★ Super Admin: thian เท่านั้นที่จัดการสิทธิ์ได้
  const isSuperAdmin=user&&user.username==="thian";

  useEffect(()=>{const t=setInterval(()=>setCurrentTime(new Date()),1000);return()=>clearInterval(t);},[]);

  const yearData=reportData[selectedYear];
  const totalWithContent=Object.values(yearData).filter(d=>(d.embedUrl&&d.embedUrl.trim()!=="")||d.fileName).length;
  const totalReported=Object.values(yearData).filter(d=>d.status==="uploaded").length;
  const totalPending=Object.values(yearData).filter(d=>d.status==="pending").length;
  const totalNotDone=12-totalReported;

  const handleLogout=()=>{localStorage.removeItem("cc_pr_user");localStorage.removeItem("cc_pr_lastActivity");window.location.href="index.html";};

  // ★ ถ้า session หมดอายุ — แสดง overlay
  if(sessionExpired){
    return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)",fontFamily:"'Noto Sans Thai',sans-serif"}}>
        <div style={{background:"rgba(30,41,59,0.95)",borderRadius:24,padding:"48px 40px",textAlign:"center",maxWidth:460,width:"90%",border:"1px solid rgba(148,163,184,0.15)",boxShadow:"0 25px 60px rgba(0,0,0,0.5)",animation:"fadeUp 0.5s ease"}}>
          <div style={{fontSize:64,marginBottom:16}}>⏰</div>
          <h1 style={{color:"#f8fafc",fontSize:22,fontWeight:700,marginBottom:8}}>เซสชันหมดอายุ</h1>
          <p style={{color:"#94a3b8",fontSize:15,lineHeight:1.7,marginBottom:12}}>ไม่มีการใช้งานเกิน 30 นาที<br/>ระบบได้ออกจากระบบอัตโนมัติเพื่อความปลอดภัย</p>
          <p style={{color:"#64748b",fontSize:13,marginBottom:28}}>กรุณาเข้าสู่ระบบใหม่อีกครั้ง</p>

        </div>
      </div>
    );
  }

          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:"#fff"}}>PR</div>
            <div><div style={{fontSize:15,fontWeight:700,color:"#f8fafc",lineHeight:1.2}}>PR CMUL Dashboard</div><div style={{fontSize:11,color:"#64748b",fontWeight:500}}>ระบบสรุปผลการดำเนินการ</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            {user&&(<div style={{textAlign:"right",marginRight:4}}>
              <div style={{color:"#e2e8f0",fontSize:13,fontWeight:600}}>{user.displayName}</div>
              <div style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,display:"inline-block",
                background:user.role==="head"?"rgba(233,69,96,0.15)":user.role==="admin"?"rgba(59,130,246,0.15)":"rgba(78,204,163,0.15)",
                color:user.role==="head"?"#e94560":user.role==="admin"?"#60a5fa":"#4ecca3",
                border:`1px solid ${user.role==="head"?"rgba(233,69,96,0.3)":user.role==="admin"?"rgba(59,130,246,0.3)":"rgba(78,204,163,0.3)"}`
              }}>{user.roleLabel}</div>
            </div>)}
            <div style={{color:"#64748b",fontSize:12,fontWeight:500,textAlign:"right"}}>
              <div>{currentTime.toLocaleDateString("th-TH",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
              <div style={{color:"#94a3b8",fontFamily:"Outfit"}}>{currentTime.toLocaleTimeString("th-TH")}</div>
            </div>
            {/* ★ ปุ่มแผงควบคุม — แสดงเฉพาะ admin เท่านั้น */}
            {canAdmin&&(
              <button onClick={()=>setShowAdmin(true)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(124,58,237,0.3)",background:"rgba(124,58,237,0.1)",color:"#a78bfa",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>⚙️ แผงควบคุม</button>
            )}
            {/* ★ ปุ่มจัดการสิทธิ์ — เฉพาะ thian เท่านั้น */}
            {isSuperAdmin&&(
              <button onClick={()=>setShowPermissions(true)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(59,130,246,0.3)",background:"rgba(59,130,246,0.1)",color:"#60a5fa",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>🔐 จัดการสิทธิ์</button>
            )}
            <button onClick={handleLogout} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>🚪 ออกจากระบบ</button>
          </div>
        </div>
      </nav>

      {/* ★ แถบเตือนก่อนหมดเวลา */}
      {warningCountdown!==null&&(
        <div style={{position:"sticky",top:64,zIndex:99,background:"rgba(234,179,8,0.15)",borderBottom:"1px solid rgba(234,179,8,0.3)",padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"center",gap:10,animation:"fadeIn 0.3s ease",backdropFilter:"blur(10px)"}}>
          <span style={{fontSize:18}}>⚠️</span>
          <span style={{color:"#fbbf24",fontSize:13,fontWeight:600}}>
            เซสชันจะหมดอายุใน {Math.floor(warningCountdown/60)} นาที {warningCountdown%60} วินาที — กรุณาขยับเมาส์หรือคลิกเพื่อต่ออายุ
          </span>
        </div>
      )}

      {/* Content */}
      <div style={{maxWidth:1280,margin:"0 auto",padding:"32px 24px",position:"relative",zIndex:1}}>

        <div style={{marginBottom:32,animation:"fadeUp 0.5s ease"}}>
          <h1 style={{fontSize:32,fontWeight:900,marginBottom:6,letterSpacing:-0.5}}>ภาพรวมผลการดำเนินงาน</h1>
          <p style={{color:"#94a3b8",fontSize:15}}>สรุปรายงานผลการดำเนินการ หน่วยสื่อสารองค์กร สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</p>
        </div>

        {/* Year Tabs */}
        <div style={{display:"flex",gap:6,marginBottom:28,background:"rgba(30,41,59,0.5)",borderRadius:14,padding:4,width:"fit-content",border:"1px solid rgba(148,163,184,0.08)"}}>
          {YEARS.map(y=>(<button key={y} onClick={()=>setSelectedYear(y)} style={{padding:"10px 28px",borderRadius:10,border:"none",background:selectedYear===y?"linear-gradient(135deg,#7c3aed,#6d28d9)":"transparent",color:selectedYear===y?"#fff":"#94a3b8",fontSize:15,fontWeight:selectedYear===y?700:500,cursor:"pointer",transition:"all 0.3s",boxShadow:selectedYear===y?"0 4px 16px rgba(124,58,237,0.3)":"none",fontFamily:"'Noto Sans Thai','Outfit',sans-serif"}}>ปี พ.ศ. {y}</button>))}
        </div>

        {/* ★ Stats Row — เปลี่ยนข้อความตามคำสั่ง */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16,marginBottom:32}}>
          <StatCard icon="📊" label="จำนวนรายงานแล้วทั้งหมด (เดือน)" value={totalReported} color="#7c3aed" delay={0.1} />
          <StatCard icon="✅" label="จำนวนรายงานที่ได้ดำเนินการแล้ว" value={totalReported} color="#22c55e" delay={0.15} />
          <StatCard icon="📁" label="จำนวนไฟล์ทั้งหมดในปีนี้" value={`${totalWithContent}/12`} color="#3b82f6" delay={0.2} />
          <StatCard icon="⏳" label="จำนวนรายงานที่ยังไม่ได้ดำเนินการ" value={totalNotDone} color="#eab308" delay={0.25} />
        </div>

        {/* ★ Progress Bar — ยังคงไว้ */}
        <div style={{background:"rgba(30,41,59,0.7)",borderRadius:16,padding:"20px 24px",marginBottom:32,border:"1px solid rgba(148,163,184,0.1)",animation:"fadeUp 0.5s ease 0.35s both"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{color:"#e2e8f0",fontSize:14,fontWeight:600}}>ความคืบหน้าการรายงานผล ปี {selectedYear}</span>
            <span style={{color:"#a78bfa",fontSize:14,fontWeight:700}}>{Math.round((totalReported/12)*100)}%</span>
          </div>
          <div style={{height:10,borderRadius:5,background:"rgba(15,23,42,0.6)",overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:5,background:"linear-gradient(90deg,#7c3aed,#3b82f6)",width:`${(totalReported/12)*100}%`,transition:"width 0.8s ease",boxShadow:"0 0 12px rgba(124,58,237,0.4)"}} />
          </div>
        </div>

        {/* Section heading */}
        <div style={{marginBottom:20,display:"flex",alignItems:"center",gap:10,animation:"fadeUp 0.5s ease 0.4s both"}}>
          <h2 style={{fontSize:20,fontWeight:800,color:"#f8fafc"}}>📋 รายงานรายเดือน</h2>
          <div style={{flex:1,height:1,background:"rgba(148,163,184,0.1)"}} />
        </div>

        {/* ★ Month Grid — แสดง iframe + ปุ่มฉบับเต็ม */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))",gap:16,marginBottom:40}}>
          {MONTHS_TH.map((month,i)=>(
            <MonthCard key={`${selectedYear}-${month}`} month={month} index={i}
              data={yearData[month]} onOpenAdmin={()=>setShowAdmin(true)} canAdmin={canAdmin} />
          ))}
        </div>

        {/* ★ Footer — เปลี่ยนข้อความ */}
        <div style={{textAlign:"center",padding:"24px 0",borderTop:"1px solid rgba(148,163,184,0.08)",color:"#475569",fontSize:12}}>
          <p style={{fontWeight:600,color:"#94a3b8"}}>หน่วยสื่อสารองค์กร สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</p>
          <p style={{marginTop:4}}>PR CMUL Dashboard V.10</p>
          <p style={{marginTop:4,color:"#64748b"}}>Developed by Thianrawich and Team</p>
          <p style={{marginTop:4}}>© {new Date().getFullYear()} สงวนลิขสิทธิ์</p>
        </div>
      </div>

      {/* Admin Panel — เฉพาะ admin */}
      {canAdmin&&(
        <AdminPanel visible={showAdmin} onClose={()=>setShowAdmin(false)}
          reportData={reportData} setReportData={setReportData} selectedYear={selectedYear} />
      )}

      {/* ★ Permissions Panel — เฉพาะ thian */}
      {isSuperAdmin&&(
        <PermissionsPanel visible={showPermissions} onClose={()=>setShowPermissions(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
