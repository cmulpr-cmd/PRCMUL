<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PR CMUL Dashboard — ระบบสรุปผลการดำเนินการ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f172a;font-family:'Noto Sans Thai','Outfit',sans-serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse2{0%,100%{opacity:1;}50%{opacity:.5;}}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.2);border-radius:3px;}
</style>
<script>
(function(){
  var allowed=false;
  try{
    var raw=localStorage.getItem('cc_pr_user');
    if(raw){var user=JSON.parse(raw);
      if(user.username&&user.displayName&&user.role&&user.loggedInAt){
        var TIMEOUT_MS=30*60*1000;
        if(Date.now()-new Date(user.loggedInAt).getTime()<24*60*60*1000){
          var lastAct=localStorage.getItem('cc_pr_lastActivity');
          if(lastAct&&(Date.now()-parseInt(lastAct,10))>TIMEOUT_MS){
            localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');
          }else{localStorage.setItem('cc_pr_lastActivity',Date.now().toString());allowed=true;}
        }else{localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');}
      }
    }
  }catch(e){}
  if(!allowed){
    window.__AUTH_BLOCKED__=true;
    document.addEventListener('DOMContentLoaded',function(){
      document.getElementById('root').innerHTML=
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);font-family:Noto Sans Thai,sans-serif">'+
        '<div style="background:rgba(30,41,59,0.9);border-radius:20px;padding:48px 40px;text-align:center;max-width:440px;width:90%;border:1px solid rgba(148,163,184,0.15);box-shadow:0 25px 60px rgba(0,0,0,0.5)">'+
        '<div style="font-size:64px;margin-bottom:16px">&#128274;</div>'+
        '<h1 style="color:#f8fafc;font-size:26px;font-weight:700;margin-bottom:8px">Access Denied</h1>'+
        '<h1 style="color:#f8fafc;font-size:22px;font-weight:700;margin-bottom:8px">ปฏิเสธการอนุญาตเข้าถึงข้อมูล</h1>'+
        '<h1 style="color:#f8fafc;font-size:20px;font-weight:700;margin-bottom:8px">หน่วยสื่อสารองค์กร</h1>'+
        '<h3 style="color:#94a3b8;font-size:15px;line-height:1.7;margin-bottom:28px">กรุณาเข้าสู่ระบบผ่านหน้า Login ให้สำเร็จ</h3>'+
        '<h3 style="color:#94a3b8;font-size:15px;line-height:1.7;margin-bottom:28px">ก่อนทำรายการหน้า DashBoard</h3>'+
        '<a href="index.html" style="display:inline-block;padding:14px 36px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;text-decoration:none;font-weight:600;font-size:15px">ไปยังหน้าเข้าสู่ระบบ →</a>'+
        '</div></div>';
    });
  }
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
if(window.__AUTH_BLOCKED__) throw new Error('auth');
const{useState,useEffect,useCallback,useRef}=React;

// ★★★ วาง URL ของ Google Apps Script Web App ที่นี่ ★★★
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwbgS1p5LXE3U7zlq1NdZithqP6pN9X7GcJIkOz9jFYnKP7xZBAbrq2xDeXtnw6w2pE/exec";

const MONTHS_TH=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const MONTHS_SHORT=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const YEARS=[2568,2569,2570];
const MONTH_ICONS=["❄️","💕","🌸","☀️","🌧️","🌈","🌻","⛅","🍂","🎃","🍁","🎄"];
const MONTH_EN=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
const STATUS_COLORS={
  uploaded:{bg:"#dcfce7",text:"#166534",border:"#86efac",label:"รายงานแล้ว"},
  pending:{bg:"#fef9c3",text:"#854d0e",border:"#fde047",label:"ยังไม่ได้ดำเนินการ"},
  empty:{bg:"#f1f5f9",text:"#64748b",border:"#cbd5e1",label:"ยังไม่มีข้อมูล"}
};

function getUser(){try{return JSON.parse(localStorage.getItem('cc_pr_user'));}catch(e){return null;}}

// ★★★ Google Sheets API ★★★
const api={
  async getReports(){
    try{
      const r=await fetch(SCRIPT_URL+"?action=getReports");
      const d=await r.json();return d.reports||{};
    }catch(e){console.error("API getReports:",e);return{};}
  },
  async saveReport(data){
    try{
      const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"saveReport",data}),headers:{"Content-Type":"text/plain"}});
      return await r.json();
    }catch(e){console.error("API saveReport:",e);return{error:e.message};}
  },
  async deleteReport(year,month){
    try{
      const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"deleteReport",year,month}),headers:{"Content-Type":"text/plain"}});
      return await r.json();
    }catch(e){console.error("API deleteReport:",e);return{error:e.message};}
  },
  async getPermissions(){
    try{
      const r=await fetch(SCRIPT_URL+"?action=getPermissions");
      const d=await r.json();return d.permissions;
    }catch(e){console.error("API getPermissions:",e);return null;}
  },
  async savePermissions(data){
    try{
      const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"savePermissions",data}),headers:{"Content-Type":"text/plain"}});
      return await r.json();
    }catch(e){console.error("API savePermissions:",e);return{error:e.message};}
  }
};

// ★ สร้างข้อมูลเปล่า
function emptyData(){
  const data={};
  YEARS.forEach(y=>{data[y]={};MONTHS_TH.forEach(m=>{data[y][m]={embedUrl:"",fileName:null,fileSize:null,uploadDate:null,cloudinaryUrl:null,cloudinaryId:null,status:"empty"};});});
  return data;
}
// ★ merge ข้อมูลจาก Google Sheet เข้ากับ template
function mergeData(saved){
  const data=emptyData();
  if(!saved)return data;
  Object.keys(saved).forEach(y=>{if(data[y]){Object.keys(saved[y]).forEach(m=>{if(data[y][m]){data[y][m]={...data[y][m],...saved[y][m]};}});}});
  return data;
}

// ★★★ Components ★★★

function StatCard({icon,label,value,color,delay}){
  return(<div style={{background:"rgba(30,41,59,0.7)",borderRadius:16,padding:"20px 24px",border:`1px solid ${color}22`,position:"relative",overflow:"hidden",animation:`fadeUp 0.5s ease ${delay}s both`}}>
    <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:`${color}10`}}/>
    <div style={{fontSize:28,marginBottom:8}}>{icon}</div>
    <div style={{color:"#94a3b8",fontSize:11,fontWeight:500,marginBottom:4,lineHeight:1.4}}>{label}</div>
    <div style={{color:"#f8fafc",fontSize:28,fontWeight:800}}>{value}</div>
  </div>);
}

function getDomain(url){try{return new URL(url).hostname.replace("www.","");}catch(e){return url;}}
function getLinkIcon(url){
  const d=getDomain(url).toLowerCase();
  if(d.includes("google"))return{icon:"📊",color:"#4285f4",label:"Google"};
  if(d.includes("canva"))return{icon:"🎨",color:"#00c4cc",label:"Canva"};
  if(d.includes("youtube"))return{icon:"▶️",color:"#ff0000",label:"YouTube"};
  if(d.includes("facebook")||d.includes("fb."))return{icon:"📘",color:"#1877f2",label:"Facebook"};
  if(d.includes("github"))return{icon:"💻",color:"#6e5494",label:"GitHub"};
  if(d.includes("notion"))return{icon:"📝",color:"#000",label:"Notion"};
  return{icon:"🌐",color:"#7c3aed",label:d};
}

function MonthCard({month,index,data,onOpenAdmin,canAdmin}){
  const[hover,setHover]=useState(false);
  const status=STATUS_COLORS[data.status];
  const hasEmbed=data.embedUrl&&data.embedUrl.trim()!=="";
  const hasFile=data.fileName;
  const hasContent=hasEmbed||hasFile;
  return(
    <div style={{background:"rgba(30,41,59,0.6)",borderRadius:16,overflow:"hidden",border:hover?"1px solid rgba(124,58,237,0.3)":"1px solid rgba(148,163,184,0.1)",transition:"all 0.3s",animation:`fadeUp 0.4s ease ${index*0.05}s both`,transform:hover?"translateY(-4px)":"none",boxShadow:hover?"0 12px 40px rgba(0,0,0,0.3)":"none"}} onMouseOver={()=>setHover(true)} onMouseOut={()=>setHover(false)}>
      <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(148,163,184,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{MONTH_ICONS[index]}</span><span style={{color:"#f8fafc",fontWeight:700,fontSize:15}}>{month}</span></div>
        <span style={{fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:20,background:status.bg,color:status.text,border:`1px solid ${status.border}`}}>{status.label}</span>
      </div>
      <div style={{padding:"14px 18px"}}>
        {hasContent?(
          <div>
            {hasEmbed&&(()=>{const info=getLinkIcon(data.embedUrl);return(
              <div style={{marginBottom:hasFile?10:0}}>
                <div style={{borderRadius:10,border:"1px solid rgba(148,163,184,0.12)",background:"rgba(15,23,42,0.5)",overflow:"hidden"}}>
                  <div style={{height:4,background:info.color}}/>
                  <div style={{padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div style={{width:40,height:40,borderRadius:10,background:info.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{info.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{color:"#e2e8f0",fontSize:13,fontWeight:700,marginBottom:2}}>รายงานเดือน{month}</div>
                        <div style={{color:"#64748b",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{info.label} • {getDomain(data.embedUrl)}</div>
                      </div>
                    </div>
                    <div style={{color:"#94a3b8",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"6px 10px",borderRadius:6,background:"rgba(15,23,42,0.5)",fontFamily:"'Outfit',monospace"}}>{data.embedUrl}</div>
                  </div>
                </div>
                <a href={data.embedUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px 16px",borderRadius:8,marginTop:8,background:"rgba(124,58,237,0.12)",border:"1px solid rgba(124,58,237,0.25)",color:"#a78bfa",fontSize:12,fontWeight:600,textDecoration:"none",fontFamily:"'Noto Sans Thai',sans-serif"}}>🔗 แสดงผลฉบับเต็ม (เปิดแท็บใหม่)</a>
              </div>);})()}
            {hasFile&&(
              <div style={{padding:"10px 12px",borderRadius:8,background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.15)",marginTop:hasEmbed?8:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:14}}>📄</span>
                  <span style={{color:"#86efac",fontSize:12,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.fileName}</span>
                  <span style={{color:"#4ade80",fontSize:11,whiteSpace:"nowrap"}}>{data.fileSize}</span>
                </div>
                {data.cloudinaryUrl&&(<a href={data.cloudinaryUrl} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,color:"#60a5fa",fontSize:11,textDecoration:"none",fontWeight:500}}>☁️ ดูไฟล์บน Cloud →</a>)}
              </div>
            )}
          </div>
        ):(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <p style={{color:"#64748b",fontSize:13,marginBottom:12}}>{data.status==="pending"?"อยู่ระหว่างดำเนินการ":"ยังไม่มีข้อมูลรายงาน"}</p>
            {canAdmin&&(<button onClick={e=>{e.stopPropagation();onOpenAdmin();}} style={{padding:"8px 20px",borderRadius:8,border:"1px solid rgba(124,58,237,0.3)",background:"rgba(124,58,237,0.1)",color:"#a78bfa",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai',sans-serif"}}>เพิ่มลิงก์ / อัปโหลดไฟล์</button>)}
          </div>
        )}
      </div>
    </div>
  );
}

// ★★★ Admin Panel ★★★
function AdminPanel({visible,onClose,reportData,setReportData,selectedYear,onRefresh}){
  const[editMonth,setEditMonth]=useState(0);
  const[urlInput,setUrlInput]=useState("");
  const[statusInput,setStatusInput]=useState("uploaded");
  const[saving,setSaving]=useState(false);
  const[saveMsg,setSaveMsg]=useState(null);
  const[dragOver,setDragOver]=useState(false);
  const[uploading,setUploading]=useState(false);
  const[uploadMsg,setUploadMsg]=useState(null);
  const fileRef=useRef(null);

  const CLOUD_NAME="dpyhc69jg";
  const UPLOAD_PRESET="pr_cmul_upload";

  // Load month data when switching
  useEffect(()=>{
    if(visible){
      const d=reportData[selectedYear][MONTHS_TH[editMonth]];
      setUrlInput(d.embedUrl||"");
      setStatusInput(d.status==="empty"?"uploaded":d.status);
    }
  },[visible,editMonth,selectedYear]);

  // ★ อัปโหลดไฟล์ไป Cloudinary แล้วบันทึก metadata ไป Google Sheet
  const handleUpload=useCallback(async(files)=>{
    if(!files||files.length===0)return;
    const file=files[0];
    if(file.size>10*1024*1024){setUploadMsg({ok:false,text:"ไฟล์ใหญ่เกิน 10MB"});setTimeout(()=>setUploadMsg(null),4000);return;}

    setUploading(true);setUploadMsg(null);
    const monthName=MONTHS_TH[editMonth];

    try{
      // 1. Upload to Cloudinary
      const fd=new FormData();
      fd.append("file",file);
      fd.append("upload_preset",UPLOAD_PRESET);
      fd.append("folder","pr_cmul/"+selectedYear+"/"+MONTH_EN[editMonth]);

      const ext=file.name.split(".").pop().toLowerCase();
      let rt="raw";
      if(["jpg","jpeg","png","gif","webp","svg","bmp"].includes(ext))rt="image";
      else if(["mp4","mov","avi","webm"].includes(ext))rt="video";

      const cRes=await fetch("https://api.cloudinary.com/v1_1/"+CLOUD_NAME+"/"+rt+"/upload",{method:"POST",body:fd});
      const cText=await cRes.text();
      let cData;try{cData=JSON.parse(cText);}catch(e){throw new Error("Cloudinary: "+cText.substring(0,100));}
      if(!cRes.ok)throw new Error(cData.error?.message||"Cloudinary error");

      // 2. Save metadata to Google Sheet
      const reportRow={
        year:selectedYear,month:monthName,
        embedUrl:urlInput.trim()||"",
        fileName:file.name,
        fileSize:(file.size/(1024*1024)).toFixed(1)+" MB",
        uploadDate:new Date().toLocaleDateString("th-TH"),
        cloudinaryUrl:cData.secure_url,
        cloudinaryId:cData.public_id,
        status:"uploaded"
      };
      const sRes=await api.saveReport(reportRow);
      if(sRes.error)throw new Error("Google Sheet: "+sRes.error);

      // 3. Update local state
      setReportData(prev=>{
        const u=JSON.parse(JSON.stringify(prev));
        u[selectedYear][monthName]={embedUrl:urlInput.trim()||"",fileName:file.name,fileSize:reportRow.fileSize,uploadDate:reportRow.uploadDate,cloudinaryUrl:cData.secure_url,cloudinaryId:cData.public_id,status:"uploaded"};
        return u;
      });
      setUploadMsg({ok:true,text:"อัปโหลด "+file.name+" สำเร็จ! (Cloudinary + Google Sheet)"});
      setTimeout(()=>setUploadMsg(null),4000);
    }catch(err){
      console.error("Upload error:",err);
      setUploadMsg({ok:false,text:"ผิดพลาด: "+err.message});
      setTimeout(()=>setUploadMsg(null),8000);
    }finally{setUploading(false);}
  },[editMonth,selectedYear,setReportData,urlInput]);

  // ★ บันทึกลิงก์ + สถานะ ไป Google Sheet
  const handleSave=async()=>{
    setSaving(true);setSaveMsg(null);
    const monthName=MONTHS_TH[editMonth];
    const existing=reportData[selectedYear][monthName];
    const reportRow={
      year:selectedYear,month:monthName,
      embedUrl:urlInput.trim(),
      fileName:existing.fileName||"",
      fileSize:existing.fileSize||"",
      uploadDate:existing.uploadDate||"",
      cloudinaryUrl:existing.cloudinaryUrl||"",
      cloudinaryId:existing.cloudinaryId||"",
      status:urlInput.trim()||existing.fileName?statusInput:"empty"
    };
    try{
      const res=await api.saveReport(reportRow);
      if(res.error)throw new Error(res.error);
      setReportData(prev=>{
        const u=JSON.parse(JSON.stringify(prev));
        u[selectedYear][monthName]={embedUrl:reportRow.embedUrl,fileName:reportRow.fileName||null,fileSize:reportRow.fileSize||null,uploadDate:reportRow.uploadDate||null,cloudinaryUrl:reportRow.cloudinaryUrl||null,cloudinaryId:reportRow.cloudinaryId||null,status:reportRow.status};
        return u;
      });
      setSaveMsg({ok:true,text:"บันทึกเดือน "+monthName+" ไป Google Sheet สำเร็จ!"});
    }catch(err){
      setSaveMsg({ok:false,text:"ผิดพลาด: "+err.message});
    }finally{setSaving(false);setTimeout(()=>setSaveMsg(null),4000);}
  };

  // ★ ลบข้อมูลเดือน
  const handleDelete=async(m)=>{
    if(!confirm("ลบข้อมูลเดือน "+m+" ?"))return;
    await api.deleteReport(selectedYear,m);
    setReportData(prev=>{const u=JSON.parse(JSON.stringify(prev));u[selectedYear][m]={embedUrl:"",fileName:null,fileSize:null,uploadDate:null,cloudinaryUrl:null,cloudinaryId:null,status:"empty"};return u;});
  };

  if(!visible)return null;

  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.3s ease"}} onClick={onClose}>
      <div style={{background:"#1e293b",borderRadius:24,width:"90%",maxWidth:640,maxHeight:"90vh",overflow:"auto",border:"1px solid rgba(148,163,184,0.15)",boxShadow:"0 25px 60px rgba(0,0,0,0.5)",animation:"slideUp 0.4s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"24px 28px",borderBottom:"1px solid rgba(148,163,184,0.1)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><h2 style={{color:"#f8fafc",fontSize:20,fontWeight:700}}>⚙️ แผงควบคุมผู้ดูแล</h2><p style={{color:"#94a3b8",fontSize:13,marginTop:4}}>ข้อมูลบันทึกไปยัง Google Sheet อัตโนมัติ</p></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onRefresh} style={{padding:"6px 14px",borderRadius:8,border:"1px solid rgba(59,130,246,0.3)",background:"rgba(59,130,246,0.1)",color:"#60a5fa",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai',sans-serif"}}>🔄 รีเฟรช</button>
            <button onClick={onClose} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(148,163,184,0.2)",background:"rgba(148,163,184,0.1)",color:"#94a3b8",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>

        <div style={{padding:"24px 28px"}}>
          <div style={{background:"rgba(124,58,237,0.1)",borderRadius:12,padding:"12px 16px",marginBottom:20,border:"1px solid rgba(124,58,237,0.2)",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>📅</span><span style={{color:"#a78bfa",fontWeight:600,fontSize:14}}>ปีงบประมาณ {selectedYear}</span>
            <span style={{marginLeft:"auto",fontSize:11,color:"#64748b"}}>💾 Google Sheet</span>
          </div>

          {/* เลือกเดือน */}
          <div style={{marginBottom:24}}>
            <label style={{color:"#94a3b8",fontSize:13,fontWeight:600,display:"block",marginBottom:8}}>เลือกเดือนที่ต้องการแก้ไข</label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {MONTHS_SHORT.map((m,i)=>{const d=reportData[selectedYear][MONTHS_TH[i]];const has=(d.embedUrl&&d.embedUrl.trim()!=="")||d.fileName;return(

  const WARNING_MS=2*60*1000;

  // ★ โหลดข้อมูลจาก Google Sheet ตอนเปิดหน้า
  const loadData=useCallback(async()=>{
    setDataLoading(true);
    try{
      const saved=await api.getReports();
      setReportData(mergeData(saved));
    }catch(e){console.error("Load error:",e);}
    finally{setDataLoading(false);}
  },[]);

  useEffect(()=>{loadData();},[]);

  // Activity timeout
  useEffect(()=>{
    function updateActivity(){localStorage.setItem('cc_pr_lastActivity',Date.now().toString());setWarningCountdown(null);}
    const events=['mousemove','mousedown','keydown','scroll','touchstart','click'];
    events.forEach(ev=>window.addEventListener(ev,updateActivity,{passive:true}));
    updateActivity();
    const checker=setInterval(()=>{
      const last=parseInt(localStorage.getItem('cc_pr_lastActivity')||'0',10);
      const remaining=TIMEOUT_MS-(Date.now()-last);
      if(remaining<=0){clearInterval(checker);localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');setSessionExpired(true);}
      else if(remaining<=WARNING_MS)setWarningCountdown(Math.ceil(remaining/1000));
      else setWarningCountdown(null);
    },10000);
    return()=>{events.forEach(ev=>window.removeEventListener(ev,updateActivity));clearInterval(checker);};
  },[]);

  const canAdmin=user&&user.role==="admin";
  const isSuperAdmin=user&&user.username==="thian";

        <div style={{fontSize:64,marginBottom:16}}>⏰</div>
        <h1 style={{color:"#f8fafc",fontSize:22,fontWeight:700,marginBottom:8}}>เซสชันหมดอายุ</h1>
        <p style={{color:"#94a3b8",fontSize:15,lineHeight:1.7,marginBottom:28}}>ไม่มีการใช้งานเกิน 30 นาที</p>
        <a href="index.html" style={{display:"inline-block",padding:"14px 36px",borderRadius:12,background:"linear-gradient(135deg,#7c3aed,#6d28d9)",color:"#fff",textDecoration:"none",fontWeight:600}}>ไปยังหน้าเข้าสู่ระบบ →</a>
      </div>
    </div>);
  }

  return(
    <div style={{minHeight:"100vh",fontFamily:"'Noto Sans Thai','Outfit',sans-serif",background:"#0f172a",color:"#f8fafc"}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,background:"radial-gradient(ellipse 800px 600px at 20% 20%,rgba(124,58,237,0.08) 0%,transparent 60%),radial-gradient(ellipse 600px 400px at 80% 80%,rgba(59,130,246,0.06) 0%,transparent 60%)"}}/>

          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:"#fff"}}>PR</div>
            <div><div style={{fontSize:15,fontWeight:700,color:"#f8fafc"}}>PR CMUL Dashboard</div><div style={{fontSize:11,color:"#64748b"}}>ระบบสรุปผลการดำเนินการ</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            {user&&(<div style={{textAlign:"right",marginRight:4}}>
              <div style={{color:"#e2e8f0",fontSize:13,fontWeight:600}}>{user.displayName}</div>
              <div style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,display:"inline-block",background:user.role==="head"?"rgba(233,69,96,0.15)":"rgba(59,130,246,0.15)",color:user.role==="head"?"#e94560":"#60a5fa",border:`1px solid ${user.role==="head"?"rgba(233,69,96,0.3)":"rgba(59,130,246,0.3)"}`}}>{user.roleLabel}</div>
            </div>)}
            <div style={{color:"#64748b",fontSize:12,textAlign:"right"}}><div>{currentTime.toLocaleDateString("th-TH",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div><div style={{color:"#94a3b8",fontFamily:"Outfit"}}>{currentTime.toLocaleTimeString("th-TH")}</div></div>
            {canAdmin&&(<button onClick={()=>setShowAdmin(true)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(124,58,237,0.3)",background:"rgba(124,58,237,0.1)",color:"#a78bfa",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai',sans-serif"}}>⚙️ แผงควบคุม</button>)}
            {isSuperAdmin&&(<button onClick={()=>setShowPermissions(true)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(59,130,246,0.3)",background:"rgba(59,130,246,0.1)",color:"#60a5fa",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai',sans-serif"}}>🔐 จัดการสิทธิ์</button>)}
            <button onClick={handleLogout} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai',sans-serif"}}>🚪 ออก</button>
          </div>
        </div>
      </nav>

      {warningCountdown!==null&&(<div style={{position:"sticky",top:64,zIndex:99,background:"rgba(234,179,8,0.15)",borderBottom:"1px solid rgba(234,179,8,0.3)",padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"center",gap:10,animation:"fadeIn 0.3s"}}>
        <span style={{fontSize:18}}>⚠️</span><span style={{color:"#fbbf24",fontSize:13,fontWeight:600}}>เซสชันจะหมดอายุใน {Math.floor(warningCountdown/60)} นาที {warningCountdown%60} วินาที — ขยับเมาส์เพื่อต่ออายุ</span>
      </div>)}

      <div style={{maxWidth:1280,margin:"0 auto",padding:"32px 24px",position:"relative",zIndex:1}}>
        <div style={{marginBottom:32,animation:"fadeUp 0.5s"}}><h1 style={{fontSize:32,fontWeight:900,letterSpacing:-0.5}}>ภาพรวมผลการดำเนินงาน</h1><p style={{color:"#94a3b8",fontSize:15,marginTop:6}}>สรุปรายงานผลการดำเนินการ หน่วยสื่อสารองค์กร สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</p></div>

        <div style={{display:"flex",gap:6,marginBottom:28,background:"rgba(30,41,59,0.5)",borderRadius:14,padding:4,width:"fit-content",border:"1px solid rgba(148,163,184,0.08)"}}>
          {YEARS.map(y=>(<button key={y} onClick={()=>setSelectedYear(y)} style={{padding:"10px 28px",borderRadius:10,border:"none",background:selectedYear===y?"linear-gradient(135deg,#7c3aed,#6d28d9)":"transparent",color:selectedYear===y?"#fff":"#94a3b8",fontSize:15,fontWeight:selectedYear===y?700:500,cursor:"pointer",boxShadow:selectedYear===y?"0 4px 16px rgba(124,58,237,0.3)":"none",fontFamily:"'Noto Sans Thai','Outfit',sans-serif"}}>ปี พ.ศ. {y}</button>))}
        </div>

        {dataLoading?(
          <div style={{textAlign:"center",padding:"60px 0"}}><div style={{fontSize:48,animation:"spin 1s linear infinite",marginBottom:16}}>⟳</div><p style={{color:"#94a3b8",fontSize:16}}>กำลังโหลดข้อมูลจาก Google Sheet...</p></div>
        ):(
          <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:32}}>
              <StatCard icon="📊" label="จำนวนรายงานแล้วทั้งหมด (เดือน)" value={totalReported} color="#7c3aed" delay={0.1}/>
              <StatCard icon="✅" label="จำนวนรายงานที่ได้ดำเนินการแล้ว" value={totalReported} color="#22c55e" delay={0.15}/>
              <StatCard icon="📁" label="จำนวนไฟล์ทั้งหมดในปีนี้" value={`${totalWithContent}/12`} color="#3b82f6" delay={0.2}/>
              <StatCard icon="⏳" label="จำนวนรายงานที่ยังไม่ได้ดำเนินการ" value={totalNotDone} color="#eab308" delay={0.25}/>
            </div>

            <div style={{background:"rgba(30,41,59,0.7)",borderRadius:16,padding:"20px 24px",marginBottom:32,border:"1px solid rgba(148,163,184,0.1)",animation:"fadeUp 0.5s ease 0.35s both"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{color:"#e2e8f0",fontSize:14,fontWeight:600}}>ความคืบหน้าการรายงานผล ปี {selectedYear}</span><span style={{color:"#a78bfa",fontSize:14,fontWeight:700}}>{Math.round((totalReported/12)*100)}%</span></div>
              <div style={{height:10,borderRadius:5,background:"rgba(15,23,42,0.6)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:5,background:"linear-gradient(90deg,#7c3aed,#3b82f6)",width:`${(totalReported/12)*100}%`,transition:"width 0.8s",boxShadow:"0 0 12px rgba(124,58,237,0.4)"}}/></div>
            </div>

            <div style={{marginBottom:20,display:"flex",alignItems:"center",gap:10}}><h2 style={{fontSize:20,fontWeight:800}}>📋 รายงานรายเดือน</h2><div style={{flex:1,height:1,background:"rgba(148,163,184,0.1)"}}/></div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16,marginBottom:40}}>
              {MONTHS_TH.map((month,i)=>(<MonthCard key={`${selectedYear}-${month}`} month={month} index={i} data={yearData[month]} onOpenAdmin={()=>setShowAdmin(true)} canAdmin={canAdmin}/>))}
            </div>
          </>
        )}

        <div style={{textAlign:"center",padding:"24px 0",borderTop:"1px solid rgba(148,163,184,0.08)",color:"#475569",fontSize:12}}>
          <p style={{fontWeight:600,color:"#94a3b8"}}>หน่วยสื่อสารองค์กร สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</p>
          <p style={{marginTop:4}}>PR CMUL Dashboard V.10</p>
          <p style={{marginTop:4,color:"#64748b"}}>Developed by Thianrawich and Team</p>
          <p style={{marginTop:4}}>© {new Date().getFullYear()} สงวนลิขสิทธิ์</p>
        </div>
      </div>

      {canAdmin&&(<AdminPanel visible={showAdmin} onClose={()=>setShowAdmin(false)} reportData={reportData} setReportData={setReportData} selectedYear={selectedYear} onRefresh={loadData}/>)}
      {isSuperAdmin&&(<PermissionsPanel visible={showPermissions} onClose={()=>setShowPermissions(false)}/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
