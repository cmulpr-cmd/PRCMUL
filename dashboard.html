<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PR CMUL Dashboard — ระบบสรุปผลการดำเนินการ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0f172a;font-family:'Noto Sans Thai','Outfit',sans-serif;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.2);border-radius:3px;}
</style>
<script>
(function(){
  var allowed=false;
  try{
    var raw=localStorage.getItem('cc_pr_user');
    if(raw){var user=JSON.parse(raw);
      if(user.username&&user.displayName&&user.role&&user.loggedInAt){
        if(Date.now()-new Date(user.loggedInAt).getTime()<24*60*60*1000){allowed=true;}
        else{localStorage.removeItem('cc_pr_user');}
      }
    }
  }catch(e){}
  if(!allowed){
    window.__AUTH_BLOCKED__=true;
    document.addEventListener('DOMContentLoaded',function(){
      document.getElementById('root').innerHTML=
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);font-family:Noto Sans Thai,sans-serif">'+
        '<div style="background:rgba(30,41,59,0.9);border-radius:20px;padding:48px 40px;text-align:center;max-width:440px;width:90%;border:1px solid rgba(148,163,184,0.15);box-shadow:0 25px 60px rgba(0,0,0,0.5)">'+
        '<div style="font-size:64px;margin-bottom:16px">&#128274;</div>'+
        '<h1 style="color:#f8fafc;font-size:22px;font-weight:700;margin-bottom:8px">ไม่ได้รับอนุญาต</h1>'+
        '<p style="color:#94a3b8;font-size:15px;line-height:1.7;margin-bottom:28px">กรุณาเข้าสู่ระบบผ่านหน้า Login ก่อน<br>เพื่อเข้าใช้งานระบบ Dashboard</p>'+
        '<a href="index.html" style="display:inline-block;padding:14px 36px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;text-decoration:none;font-weight:600;font-size:15px;box-shadow:0 4px 20px rgba(124,58,237,0.4)">ไปยังหน้าเข้าสู่ระบบ →</a>'+
        '</div></div>';
    });
  }
})();
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
if(window.__AUTH_BLOCKED__) throw new Error('auth');

const{useState,useEffect,useCallback,useRef}=React;

const MONTHS_TH=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const MONTHS_SHORT=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const YEARS=[2568,2569,2570];
const MONTH_ICONS=["❄️","💕","🌸","☀️","🌧️","🌈","🌻","⛅","🍂","🎃","🍁","🎄"];

const STATUS_COLORS={
  uploaded:{bg:"#dcfce7",text:"#166534",border:"#86efac",label:"รายงานแล้ว"},
  pending:{bg:"#fef9c3",text:"#854d0e",border:"#fde047",label:"ยังไม่ได้ดำเนินการ"},
  empty:{bg:"#f1f5f9",text:"#64748b",border:"#cbd5e1",label:"ยังไม่มีข้อมูล"}
};

function getUser(){try{return JSON.parse(localStorage.getItem('cc_pr_user'));}catch(e){return null;}}

// ★ ข้อมูลลิงก์ embed ของแต่ละเดือน — แก้ไข URL ได้ที่นี่
function getDefaultEmbedData(){
  const data={};
  YEARS.forEach(y=>{
    data[y]={};
    MONTHS_TH.forEach((m,i)=>{
      data[y][m]={
        embedUrl:"",  // ← ใส่ลิงก์เว็บไซต์ที่ต้องการ embed เช่น "https://example.com/report-jan-2568"
        status:"empty"
      };
    });
  });
  // ตัวอย่าง: ใส่ลิงก์สำหรับเดือนที่มีข้อมูลแล้ว
  // data[2568]["มกราคม"] = { embedUrl: "https://example.com/report", status: "uploaded" };
  return data;
}

function StatCard({icon,label,value,color,delay}){
  return(
    <div style={{background:"rgba(30,41,59,0.7)",borderRadius:16,padding:"20px 24px",border:`1px solid ${color}22`,position:"relative",overflow:"hidden",animation:`fadeUp 0.5s ease ${delay}s both`,backdropFilter:"blur(10px)"}}>
      <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:`${color}10`}} />
      <div style={{fontSize:28,marginBottom:8}}>{icon}</div>
      <div style={{color:"#94a3b8",fontSize:11,fontWeight:500,marginBottom:4,lineHeight:1.4}}>{label}</div>
      <div style={{color:"#f8fafc",fontSize:28,fontWeight:800}}>{value}</div>
    </div>
  );
}

function MonthCard({month,index,data,onOpenAdmin,canAdmin}){
  const [hover,setHover]=useState(false);
  const status=STATUS_COLORS[data.status];
  const hasEmbed=data.embedUrl&&data.embedUrl.trim()!=="";

  return(
    <div style={{background:"rgba(30,41,59,0.6)",borderRadius:16,overflow:"hidden",border:hover?"1px solid rgba(124,58,237,0.3)":"1px solid rgba(148,163,184,0.1)",transition:"all 0.3s ease",animation:`fadeUp 0.4s ease ${index*0.05}s both`,transform:hover?"translateY(-4px)":"translateY(0)",boxShadow:hover?"0 12px 40px rgba(0,0,0,0.3)":"none"}} onMouseOver={()=>setHover(true)} onMouseOut={()=>setHover(false)}>
      {/* Header */}
      <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(148,163,184,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20}}>{MONTH_ICONS[index]}</span>
          <span style={{color:"#f8fafc",fontWeight:700,fontSize:15}}>{month}</span>
        </div>
        <span style={{fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:20,background:status.bg,color:status.text,border:`1px solid ${status.border}`}}>{status.label}</span>
      </div>

      {/* Content */}
      <div style={{padding:"14px 18px"}}>
        {hasEmbed?(
          <div>
            {/* Iframe preview เล็กๆ */}
            <div style={{borderRadius:10,overflow:"hidden",border:"1px solid rgba(148,163,184,0.15)",marginBottom:10,background:"#0f172a",position:"relative",height:160}}>
              <iframe src={data.embedUrl} style={{width:"100%",height:"100%",border:"none",borderRadius:10,pointerEvents:"none"}} title={month} loading="lazy" sandbox="allow-scripts allow-same-origin" />
              <div style={{position:"absolute",inset:0,background:"transparent"}} />
            </div>
            {/* ปุ่มเปิดฉบับเต็ม */}
            <a href={data.embedUrl} target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",padding:"8px 16px",borderRadius:8,background:"rgba(124,58,237,0.12)",border:"1px solid rgba(124,58,237,0.25)",color:"#a78bfa",fontSize:12,fontWeight:600,textDecoration:"none",transition:"all 0.2s",fontFamily:"'Noto Sans Thai', sans-serif"}}
              onMouseOver={e=>{e.target.style.background="rgba(124,58,237,0.2)";}} onMouseOut={e=>{e.target.style.background="rgba(124,58,237,0.12)";}}>
              🔗 แสดงผลฉบับเต็ม (เปิดแท็บใหม่)
            </a>
          </div>
        ):(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <p style={{color:"#64748b",fontSize:13,marginBottom:12}}>
              {data.status==="pending"?"อยู่ระหว่างดำเนินการ":"ยังไม่มีลิงก์รายงาน"}
            </p>
            {canAdmin&&(
              <button onClick={(e)=>{e.stopPropagation();onOpenAdmin();}} style={{padding:"8px 20px",borderRadius:8,border:"1px solid rgba(124,58,237,0.3)",background:"rgba(124,58,237,0.1)",color:"#a78bfa",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>
                เพิ่มลิงก์รายงาน
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function AdminPanel({visible,onClose,reportData,setReportData,selectedYear}){
  const [editMonth,setEditMonth]=useState(0);
  const [urlInput,setUrlInput]=useState("");
  const [statusInput,setStatusInput]=useState("uploaded");
  const [saveMsg,setSaveMsg]=useState(null);

  const handleSave=()=>{
    const monthName=MONTHS_TH[editMonth];
    setReportData(prev=>{
      const u=JSON.parse(JSON.stringify(prev));
      u[selectedYear][monthName]={embedUrl:urlInput.trim(),status:urlInput.trim()?statusInput:"empty"};
      return u;
    });
    setSaveMsg(monthName);
    setTimeout(()=>setSaveMsg(null),2500);
  };

  const handleDelete=(m)=>{
    setReportData(prev=>{
      const u=JSON.parse(JSON.stringify(prev));
      u[selectedYear][m]={embedUrl:"",status:"empty"};
      return u;
    });
  };

  useEffect(()=>{
    if(visible){
      const monthName=MONTHS_TH[editMonth];
      const d=reportData[selectedYear][monthName];
      setUrlInput(d.embedUrl||"");
      setStatusInput(d.status==="empty"?"uploaded":d.status);
    }
  },[visible,editMonth,selectedYear]);

  if(!visible)return null;

  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.3s ease"}} onClick={onClose}>
      <div style={{background:"#1e293b",borderRadius:24,width:"90%",maxWidth:620,maxHeight:"90vh",overflow:"auto",border:"1px solid rgba(148,163,184,0.15)",boxShadow:"0 25px 60px rgba(0,0,0,0.5)",animation:"slideUp 0.4s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"24px 28px",borderBottom:"1px solid rgba(148,163,184,0.1)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><h2 style={{color:"#f8fafc",fontSize:20,fontWeight:700}}>⚙️ แผงควบคุมผู้ดูแล</h2><p style={{color:"#94a3b8",fontSize:13,marginTop:4}}>จัดการลิงก์รายงานของแต่ละเดือน</p></div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(148,163,184,0.2)",background:"rgba(148,163,184,0.1)",color:"#94a3b8",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        <div style={{padding:"24px 28px"}}>
          <div style={{background:"rgba(124,58,237,0.1)",borderRadius:12,padding:"12px 16px",marginBottom:20,border:"1px solid rgba(124,58,237,0.2)",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>📅</span><span style={{color:"#a78bfa",fontWeight:600,fontSize:14}}>ปีงบประมาณ {selectedYear}</span>
          </div>

          {/* เลือกเดือน */}
          <div style={{marginBottom:20}}>
            <label style={{color:"#94a3b8",fontSize:13,fontWeight:600,display:"block",marginBottom:8}}>เลือกเดือนที่ต้องการแก้ไข</label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:6}}>
              {MONTHS_SHORT.map((m,i)=>(
                <button key={i} onClick={()=>setEditMonth(i)} style={{padding:"10px 4px",borderRadius:10,border:editMonth===i?"1px solid #7c3aed":"1px solid rgba(148,163,184,0.15)",background:editMonth===i?"rgba(124,58,237,0.15)":"rgba(15,23,42,0.5)",color:editMonth===i?"#a78bfa":"#94a3b8",fontSize:13,fontWeight:editMonth===i?700:500,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>{MONTH_ICONS[i]} {m}</button>
              ))}
            </div>
          </div>

          {/* ช่องใส่ URL */}
          <div style={{marginBottom:16}}>
            <label style={{color:"#94a3b8",fontSize:13,fontWeight:600,display:"block",marginBottom:8}}>ลิงก์เว็บไซต์รายงาน (URL)</label>
            <input value={urlInput} onChange={e=>setUrlInput(e.target.value)} placeholder="https://example.com/report..." style={{width:"100%",padding:"12px 16px",borderRadius:10,border:"1px solid rgba(148,163,184,0.2)",background:"rgba(15,23,42,0.6)",color:"#e2e8f0",fontSize:14,outline:"none",fontFamily:"'Noto Sans Thai','Outfit',sans-serif"}} />
          </div>

          {/* เลือกสถานะ */}
          <div style={{marginBottom:20}}>
            <label style={{color:"#94a3b8",fontSize:13,fontWeight:600,display:"block",marginBottom:8}}>สถานะ</label>
            <div style={{display:"flex",gap:8}}>
              {[{v:"uploaded",l:"รายงานแล้ว",c:"#22c55e"},{v:"pending",l:"ยังไม่ได้ดำเนินการ",c:"#eab308"}].map(s=>(
                <button key={s.v} onClick={()=>setStatusInput(s.v)} style={{flex:1,padding:"10px",borderRadius:10,border:`1px solid ${statusInput===s.v?s.c+"66":"rgba(148,163,184,0.15)"}`,background:statusInput===s.v?s.c+"15":"rgba(15,23,42,0.5)",color:statusInput===s.v?s.c:"#94a3b8",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>{s.l}</button>
              ))}
            </div>
          </div>

          {/* ปุ่มบันทึก */}
          <button onClick={handleSave} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#7c3aed,#6d28d9)",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif",boxShadow:"0 4px 16px rgba(124,58,237,0.3)",marginBottom:20}}>
            💾 บันทึกข้อมูลเดือน {MONTHS_TH[editMonth]}
          </button>

          {saveMsg&&(<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,marginBottom:20,animation:"fadeIn 0.3s ease"}}><span style={{fontSize:18}}>✅</span><span style={{color:"#4ade80",fontSize:14,fontWeight:600}}>บันทึกเดือน {saveMsg} สำเร็จ!</span></div>)}

          {/* รายการทั้งหมด */}
          <h3 style={{color:"#e2e8f0",fontSize:15,fontWeight:700,marginBottom:12}}>📁 ลิงก์รายงานทั้งหมด — ปี {selectedYear}</h3>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {MONTHS_TH.map((m,i)=>{
              const d=reportData[selectedYear][m];
              const hasLink=d.embedUrl&&d.embedUrl.trim()!=="";
              return(
                <div key={m} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,background:"rgba(15,23,42,0.5)",border:"1px solid rgba(148,163,184,0.08)"}}>
                  <span style={{fontSize:14}}>{MONTH_ICONS[i]}</span>
                  <span style={{color:"#cbd5e1",fontSize:13,fontWeight:600,minWidth:55}}>{MONTHS_SHORT[i]}</span>
                  {hasLink?(
                    <>
                      <span style={{color:"#94a3b8",fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.embedUrl}</span>
                      <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,background:STATUS_COLORS[d.status].bg,color:STATUS_COLORS[d.status].text}}>{STATUS_COLORS[d.status].label}</span>
                      <button onClick={()=>handleDelete(m)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.1)",color:"#f87171",fontSize:11,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>ลบ</button>
                    </>
                  ):(
                    <span style={{fontSize:11,color:"#64748b",fontWeight:500}}>— ยังไม่มีลิงก์ —</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function Dashboard(){
  const [reportData,setReportData]=useState(getDefaultEmbedData);
  const [selectedYear,setSelectedYear]=useState(2568);
  const [showAdmin,setShowAdmin]=useState(false);
  const [currentTime,setCurrentTime]=useState(new Date());
  const user=getUser();

  // ★ สิทธิ์: admin เท่านั้นที่เข้าแผงควบคุมได้ (apinanun.s, thian)
  const canAdmin=user&&user.role==="admin";

  useEffect(()=>{const t=setInterval(()=>setCurrentTime(new Date()),1000);return()=>clearInterval(t);},[]);

  const yearData=reportData[selectedYear];
  const totalWithLink=Object.values(yearData).filter(d=>d.embedUrl&&d.embedUrl.trim()!=="").length;
  const totalReported=Object.values(yearData).filter(d=>d.status==="uploaded").length;
  const totalPending=Object.values(yearData).filter(d=>d.status==="pending").length;
  const totalNotDone=12-totalReported;

  const handleLogout=()=>{localStorage.removeItem("cc_pr_user");window.location.href="index.html";};

  return(
    <div style={{minHeight:"100vh",fontFamily:"'Noto Sans Thai','Outfit',sans-serif",background:"#0f172a",color:"#f8fafc"}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,background:"radial-gradient(ellipse 800px 600px at 20% 20%,rgba(124,58,237,0.08) 0%,transparent 60%),radial-gradient(ellipse 600px 400px at 80% 80%,rgba(59,130,246,0.06) 0%,transparent 60%)"}} />

      {/* Nav */}
      <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(15,23,42,0.85)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(148,163,184,0.08)",padding:"0 24px"}}>
        <div style={{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:64}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:"#fff"}}>PR</div>
            <div><div style={{fontSize:15,fontWeight:700,color:"#f8fafc",lineHeight:1.2}}>PR CMUL Dashboard</div><div style={{fontSize:11,color:"#64748b",fontWeight:500}}>ระบบสรุปผลการดำเนินการ</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            {user&&(<div style={{textAlign:"right",marginRight:4}}>
              <div style={{color:"#e2e8f0",fontSize:13,fontWeight:600}}>{user.displayName}</div>
              <div style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,display:"inline-block",
                background:user.role==="head"?"rgba(233,69,96,0.15)":user.role==="admin"?"rgba(59,130,246,0.15)":"rgba(78,204,163,0.15)",
                color:user.role==="head"?"#e94560":user.role==="admin"?"#60a5fa":"#4ecca3",
                border:`1px solid ${user.role==="head"?"rgba(233,69,96,0.3)":user.role==="admin"?"rgba(59,130,246,0.3)":"rgba(78,204,163,0.3)"}`
              }}>{user.roleLabel}</div>
            </div>)}
            <div style={{color:"#64748b",fontSize:12,fontWeight:500,textAlign:"right"}}>
              <div>{currentTime.toLocaleDateString("th-TH",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
              <div style={{color:"#94a3b8",fontFamily:"Outfit"}}>{currentTime.toLocaleTimeString("th-TH")}</div>
            </div>
            {/* ★ ปุ่มแผงควบคุม — แสดงเฉพาะ admin เท่านั้น */}
            {canAdmin&&(
              <button onClick={()=>setShowAdmin(true)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(124,58,237,0.3)",background:"rgba(124,58,237,0.1)",color:"#a78bfa",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>⚙️ แผงควบคุม</button>
            )}
            <button onClick={handleLogout} style={{padding:"8px 16px",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans Thai', sans-serif"}}>🚪 ออกจากระบบ</button>
          </div>
        </div>
      </nav>

      {/* Content */}
      <div style={{maxWidth:1280,margin:"0 auto",padding:"32px 24px",position:"relative",zIndex:1}}>

        <div style={{marginBottom:32,animation:"fadeUp 0.5s ease"}}>
          <h1 style={{fontSize:32,fontWeight:900,marginBottom:6,letterSpacing:-0.5}}>ภาพรวมผลการดำเนินงาน</h1>
          <p style={{color:"#94a3b8",fontSize:15}}>สรุปรายงานผลการดำเนินการ หน่วยสื่อสารองค์กร สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</p>
        </div>

        {/* Year Tabs */}
        <div style={{display:"flex",gap:6,marginBottom:28,background:"rgba(30,41,59,0.5)",borderRadius:14,padding:4,width:"fit-content",border:"1px solid rgba(148,163,184,0.08)"}}>
          {YEARS.map(y=>(<button key={y} onClick={()=>setSelectedYear(y)} style={{padding:"10px 28px",borderRadius:10,border:"none",background:selectedYear===y?"linear-gradient(135deg,#7c3aed,#6d28d9)":"transparent",color:selectedYear===y?"#fff":"#94a3b8",fontSize:15,fontWeight:selectedYear===y?700:500,cursor:"pointer",transition:"all 0.3s",boxShadow:selectedYear===y?"0 4px 16px rgba(124,58,237,0.3)":"none",fontFamily:"'Noto Sans Thai','Outfit',sans-serif"}}>ปี พ.ศ. {y}</button>))}
        </div>

        {/* ★ Stats Row — เปลี่ยนข้อความตามคำสั่ง */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16,marginBottom:32}}>
          <StatCard icon="📊" label="จำนวนรายงานแล้วทั้งหมด (เดือน)" value={totalReported} color="#7c3aed" delay={0.1} />
          <StatCard icon="✅" label="จำนวนรายงานที่ได้ดำเนินการแล้ว" value={totalReported} color="#22c55e" delay={0.15} />
          <StatCard icon="📁" label="จำนวนไฟล์ทั้งหมดในปีนี้" value={`${totalWithLink}/12`} color="#3b82f6" delay={0.2} />
          <StatCard icon="⏳" label="จำนวนรายงานที่ยังไม่ได้ดำเนินการ" value={totalNotDone} color="#eab308" delay={0.25} />
        </div>

        {/* ★ Progress Bar — ยังคงไว้ */}
        <div style={{background:"rgba(30,41,59,0.7)",borderRadius:16,padding:"20px 24px",marginBottom:32,border:"1px solid rgba(148,163,184,0.1)",animation:"fadeUp 0.5s ease 0.35s both"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{color:"#e2e8f0",fontSize:14,fontWeight:600}}>ความคืบหน้าการรายงานผล ปี {selectedYear}</span>
            <span style={{color:"#a78bfa",fontSize:14,fontWeight:700}}>{Math.round((totalReported/12)*100)}%</span>
          </div>
          <div style={{height:10,borderRadius:5,background:"rgba(15,23,42,0.6)",overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:5,background:"linear-gradient(90deg,#7c3aed,#3b82f6)",width:`${(totalReported/12)*100}%`,transition:"width 0.8s ease",boxShadow:"0 0 12px rgba(124,58,237,0.4)"}} />
          </div>
        </div>

        {/* Section heading */}
        <div style={{marginBottom:20,display:"flex",alignItems:"center",gap:10,animation:"fadeUp 0.5s ease 0.4s both"}}>
          <h2 style={{fontSize:20,fontWeight:800,color:"#f8fafc"}}>📋 รายงานรายเดือน</h2>
          <div style={{flex:1,height:1,background:"rgba(148,163,184,0.1)"}} />
        </div>

        {/* ★ Month Grid — แสดง iframe + ปุ่มฉบับเต็ม */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))",gap:16,marginBottom:40}}>
          {MONTHS_TH.map((month,i)=>(
            <MonthCard key={`${selectedYear}-${month}`} month={month} index={i}
              data={yearData[month]} onOpenAdmin={()=>setShowAdmin(true)} canAdmin={canAdmin} />
          ))}
        </div>

        {/* ★ Footer — เปลี่ยนข้อความ */}
        <div style={{textAlign:"center",padding:"24px 0",borderTop:"1px solid rgba(148,163,184,0.08)",color:"#475569",fontSize:12}}>
          <p style={{fontWeight:600,color:"#94a3b8"}}>หน่วยสื่อสารองค์กร สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</p>
          <p style={{marginTop:4}}>PR CMUL Dashboard V.10</p>
          <p style={{marginTop:4,color:"#64748b"}}>Developed by Thianrawich and Team</p>
          <p style={{marginTop:4}}>© {new Date().getFullYear()} สงวนลิขสิทธิ์</p>
        </div>
      </div>

      {/* Admin Panel — เฉพาะ admin */}
      {canAdmin&&(
        <AdminPanel visible={showAdmin} onClose={()=>setShowAdmin(false)}
          reportData={reportData} setReportData={setReportData} selectedYear={selectedYear} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
