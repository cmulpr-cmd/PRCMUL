<!DOCTYPE html>
<html lang="th">
<head>
<script>
(function() {
  // 1. บล็อคการคลิกขวา
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  // 2. บล็อคปุ่มลัด DevTools และปุ่มสั่งปริ้น (Ctrl+P)
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) { e.preventDefault(); return false; }
    
    // 🖨️ ดักจับการกดปุ่มสั่งปริ้น (Ctrl+P) + แจ้งเตือน + ส่งเมล
    if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 'P' || e.keyCode === 80)) {
      e.preventDefault();
      alert("🔒 ระบบความปลอดภัย: ไม่อนุญาตให้พิมพ์หรือบันทึกหน้าจอนี้ครับ\nเราจะส่งแจ้งเตือนความปลอดภัยดังกล่าวให้คุณเธียรวิชญ์ทราบ");
      sendAlertEmail(); 
      return false;
    }
  });

  // 3. กับดัก Debugger
  setInterval(function() {
    var before = new Date().getTime();
    debugger; 
    var after = new Date().getTime();
    if (after - before > 100) {
      document.body.innerHTML = ''; 
      window.location.replace("index.html"); 
    }
  }, 1000);
})();

function sendAlertEmail() {
  const scriptURL = "https://script.google.com/macros/s/AKfycbz0Ba8RTgWOVn7Y-NXhw5CQs3FTlC8HD7F6ysGvD55LXZxxQ3VAbvTnbNO3GPrQ9S8qbA/exec";
  let username = "ผู้เยี่ยมชม (หน้า Login)";
  try {
    const raw = localStorage.getItem('cc_pr_user');
    if (raw) { username = JSON.parse(raw).username; }
  } catch(e) {}
  fetch(scriptURL + "?action=sendAlertEmail&user=" + encodeURIComponent(username), { method: 'GET', mode: 'no-cors' });
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR DASHBOARD-LOGIN</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #7c3aed;
    --primary-gradient: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
    --text: #1a1d2e;
    --text-muted: #5a6178;
    --error: #dc2626;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: linear-gradient(-45deg, #1e1b4b, #831843, #4c1d95, #701a75);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  
  @media print {
    body * { visibility: hidden !important; display: none !important; }
    body::before {
      content: "🔒 ระบบความปลอดภัย: ไม่อนุญาตให้พิมพ์หรือบันทึกหน้าจอนี้ครับ\nเราจะส่งแจ้งเตือนความปลอดภัยดังกล่าวให้คุณเธียรวิชญ์ทราบ";
      visibility: visible !important; display: block !important; position: absolute;
      top: 100px; left: 0; right: 0; text-align: center; font-size: 20px; font-weight: bold;
      color: #dc2626; white-space: pre-line;
    }
  }

  .login-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 28px; padding: 45px 35px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    width: 100%; max-width: 420px; z-index: 1;
  }
  .brand { text-align: center; margin-bottom: 30px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
  input {
    width: 100%; padding: 14px 16px;
    border: 1.5px solid rgba(0,0,0,0.1); border-radius: 14px;
    font-size: 1rem; outline: none;
  }
  input:focus { border-color: var(--primary); }
  .login-btn {
    width: 100%; padding: 16px; background: var(--primary-gradient);
    border: none; border-radius: 14px; color: white;
    font-weight: 600; cursor: pointer; margin-top: 10px;
  }
  .error-msg { text-align: center; color: var(--error); font-size: 0.85rem; margin-top: 15px; display: none; }
  .error-msg.show { display: block; }
  
  /* Success Overlay */
  .success-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
    opacity: 0; pointer-events: none; transition: 0.5s;
  }
  .success-overlay.show { opacity: 1; pointer-events: all; }
  .success-card { background: white; padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 350px; }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <img src="logo web.png" alt="Logo" style="max-width: 100px; margin-bottom: 15px;">
    <h2>ยินดีต้อนรับ</h2>
    <p style="font-size: 0.9rem; color: #666;">PR CMUL Dashboard</p>
  </div>
  <form id="loginForm" onsubmit="return handleLogin(event)">
    <div class="form-group">
      <label>ชื่อผู้ใช้งาน</label>
      <input type="text" id="username" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit" class="login-btn" id="loginBtn">เข้าสู่ระบบ</button>
    <div class="error-msg" id="errorMsg">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</div>
  </form>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <h3 id="welcomeText">กำลังตรวจสอบ...</h3>
    <p id="redirectMsg" style="margin-top:10px; font-size:0.9rem;"></p>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0Ba8RTgWOVn7Y-NXhw5CQs3FTlC8HD7F6ysGvD55LXZxxQ3VAbvTnbNO3GPrQ9S8qbA/exec";
  let accounts = {};
  let loaded = false;

  (async function() {
    try {
      const res = await fetch(SCRIPT_URL + "?action=getAccounts");
      const data = await res.json();
      accounts = data.accounts;
      loaded = true;
    } catch(e) { console.error(e); }
  })();

  function handleLogin(e) {
    e.preventDefault();
    if(!loaded) return alert("กำลังโหลดข้อมูล... โปรดลองใหม่");
    
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    
    if(accounts[u] && accounts[u].password === p) {
      const acc = accounts[u];
      localStorage.setItem('cc_pr_user', JSON.stringify({
        username: u, displayName: acc.displayName, loggedInAt: new Date().toISOString()
      }));
      localStorage.setItem('cc_pr_lastActivity', Date.now().toString());
      
      document.getElementById('successOverlay').classList.add('show');
      document.getElementById('welcomeText').textContent = "ยินดีต้อนรับคุณ " + acc.displayName;
      
      let sec = 3;
      const timer = setInterval(() => {
        document.getElementById('redirectMsg').textContent = `กำลังไปหน้า Dashboard ใน ${sec} วินาที...`;
        if(sec <= 0) { clearInterval(timer); window.location.href = 'dashboard.html'; }
        sec--;
      }, 1000);
    } else {
      err.classList.add('show');
    }
    return false;
  }
</script>
</body>
</html>
