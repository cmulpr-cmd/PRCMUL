<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC&amp;PR CMUL — เข้าสู่ระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent-glow: rgba(233, 69, 96, 0.35);
    --surface: #16213e;
    --surface-light: #1c2a4a;
    --text: #eaeaea;
    --text-muted: #8892a4;
    --success: #4ecca3;
    --input-bg: rgba(255,255,255,0.06);
    --input-border: rgba(255,255,255,0.1);
    --input-focus: rgba(233, 69, 96, 0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--primary);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 50%, rgba(233,69,96,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(78,204,163,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(22,33,62,0.8) 0%, transparent 50%);
    animation: bgShift 20s ease-in-out infinite alternate; z-index: 0;
  }
  @keyframes bgShift { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(-5%,3%) rotate(3deg); } }
  .geo { position: fixed; border: 1px solid rgba(233,69,96,0.1); border-radius: 50%; z-index: 0; animation: float 15s ease-in-out infinite; }
  .geo:nth-child(1) { width:300px;height:300px;top:-80px;right:-60px;animation-delay:0s; }
  .geo:nth-child(2) { width:200px;height:200px;bottom:-40px;left:-40px;animation-delay:-5s;border-color:rgba(78,204,163,0.1); }
  .geo:nth-child(3) { width:150px;height:150px;top:40%;left:10%;animation-delay:-10s; }
  .geo:nth-child(4) { width:80px;height:80px;bottom:20%;right:15%;animation-delay:-3s;border-color:rgba(78,204,163,0.08); }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-20px) rotate(5deg);} }
  .login-container { position:relative;z-index:1;width:100%;max-width:440px;padding:20px;animation:slideUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards;opacity:0; }
  @keyframes slideUp { from{opacity:0;transform:translateY(40px);} to{opacity:1;transform:translateY(0);} }
  .login-card { background:rgba(22,33,62,0.7);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:48px 40px;box-shadow:0 25px 60px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05); }
  .brand { text-align:center;margin-bottom:40px; }
  .brand-icon { width:64px;height:64px;background:linear-gradient(135deg,var(--accent) 0%,#c92a4a 100%);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 30px var(--accent-glow);animation:pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 8px 30px var(--accent-glow);} 50%{box-shadow:0 8px 50px rgba(233,69,96,0.5);} }
  .brand-icon svg { width:32px;height:32px;fill:white; }
  .brand h1 { font-family:'Kanit',sans-serif;font-weight:600;font-size:1.5rem;color:var(--text);letter-spacing:0.5px; }
  .brand p { color:var(--text-muted);font-size:0.9rem;margin-top:6px;font-weight:300; }
  .form-group { margin-bottom:20px;position:relative; }
  .form-group label { display:block;font-family:'Kanit',sans-serif;font-weight:400;font-size:0.85rem;color:var(--text-muted);margin-bottom:8px; }
  .input-wrapper { position:relative; }
  .input-wrapper .icon { position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:var(--text-muted);transition:fill 0.3s;pointer-events:none; }
  .form-group input { width:100%;padding:14px 16px 14px 48px;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:14px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:1rem;outline:none;transition:all 0.3s ease; }
  .form-group input::placeholder { color:rgba(255,255,255,0.2); }
  .form-group input:focus { border-color:var(--accent);background:rgba(233,69,96,0.04);box-shadow:0 0 0 4px rgba(233,69,96,0.1); }
  .toggle-pass { position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;opacity:0.4;transition:opacity 0.3s; }
  .toggle-pass:hover { opacity:0.8; }
  .toggle-pass svg { width:18px;height:18px;fill:var(--text-muted); }
  .login-btn { width:100%;padding:16px;background:linear-gradient(135deg,var(--accent) 0%,#c92a4a 100%);border:none;border-radius:14px;color:white;font-family:'Kanit',sans-serif;font-weight:500;font-size:1.05rem;cursor:pointer;margin-top:12px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.3s;box-shadow:0 6px 25px var(--accent-glow); }
  .login-btn:hover { transform:translateY(-2px);box-shadow:0 10px 35px rgba(233,69,96,0.45); }
  .login-btn:active { transform:translateY(0); }
  .login-btn::after { content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.5s; }
  .login-btn:hover::after { left:100%; }
  .error-msg { text-align:center;color:var(--accent);font-size:0.85rem;margin-top:16px;min-height:22px;font-weight:500;opacity:0;transform:translateY(-5px);transition:all 0.3s; }
  .error-msg.show { opacity:1;transform:translateY(0); }
  .success-overlay { position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;background:var(--primary);opacity:0;pointer-events:none;transition:opacity 0.5s ease; }
  .success-overlay.show { opacity:1;pointer-events:all; }
  .success-overlay .check-circle { width:80px;height:80px;border-radius:50%;background:var(--success);display:flex;align-items:center;justify-content:center;transform:scale(0);transition:transform 0.5s cubic-bezier(0.22,1,0.36,1) 0.2s;box-shadow:0 10px 40px rgba(78,204,163,0.3); }
  .success-overlay.show .check-circle { transform:scale(1); }
  .success-overlay .check-circle svg { width:40px;height:40px;fill:white; }
  .success-overlay h2 { font-family:'Kanit',sans-serif;color:var(--text);margin-top:24px;font-size:1.4rem;font-weight:500;opacity:0;transform:translateY(10px);transition:all 0.4s ease 0.5s; }
  .success-overlay.show h2 { opacity:1;transform:translateY(0); }
  .success-overlay p { color:var(--text-muted);margin-top:8px;font-size:0.95rem;opacity:0;transition:opacity 0.4s ease 0.7s; }
  .success-overlay.show p { opacity:1; }
  .role-badge { display:inline-block;padding:4px 14px;border-radius:20px;font-family:'Kanit',sans-serif;font-size:0.8rem;font-weight:500;margin-top:14px;opacity:0;transition:opacity 0.4s ease 0.9s; }
  .success-overlay.show .role-badge { opacity:1; }
  .role-badge.head { background:rgba(233,69,96,0.15);color:var(--accent);border:1px solid rgba(233,69,96,0.3); }
  .role-badge.admin { background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3); }
  .role-badge.staff { background:rgba(78,204,163,0.15);color:var(--success);border:1px solid rgba(78,204,163,0.3); }
  .go-btn { display:inline-block;margin-top:28px;padding:16px 40px;background:linear-gradient(135deg,var(--accent) 0%,#c92a4a 100%);color:white;text-decoration:none;font-family:'Kanit',sans-serif;font-weight:500;font-size:1.05rem;border-radius:14px;box-shadow:0 6px 25px var(--accent-glow);opacity:0;transform:translateY(10px);transition:all 0.4s ease 1.1s;cursor:pointer;border:none; }
  .success-overlay.show .go-btn { opacity:1;transform:translateY(0); }
  .go-btn:hover { transform:translateY(-2px)!important;box-shadow:0 10px 35px rgba(233,69,96,0.5); }
  .redirect-msg { color:var(--text-muted);margin-top:16px;font-size:0.8rem;opacity:0;transition:opacity 0.4s ease 1.5s; }
  .success-overlay.show .redirect-msg { opacity:1; }
  .footer-text { text-align:center;margin-top:28px;color:var(--text-muted);font-size:0.78rem;opacity:0.5; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 10%,30%,50%,70%,90%{transform:translateX(-4px);} 20%,40%,60%,80%{transform:translateX(4px);} }
  .shake { animation:shake 0.5s ease; }
  .login-btn.loading { pointer-events:none;opacity:0.8; }
  .spinner { display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto; }
  .login-btn.loading .btn-text { display:none; }
  .login-btn.loading .spinner { display:block; }
  @keyframes spin { to{transform:rotate(360deg);} }
  @media (max-width:480px) { .login-card{padding:36px 24px;} .brand h1{font-size:1.3rem;} }
</style>
</head>
<body>
<div class="geo"></div><div class="geo"></div><div class="geo"></div><div class="geo"></div>

<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M20 6h-1v8c0 .55-.45 1-1 1H6v1c0 1.1.9 2 2 2h10l4 4V8c0-1.1-.9-2-2-2zm-3 5V4c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v13l4-4h9c1.1 0 2-.9 2-2z"/></svg>
      </div>
      <h1>CC&amp;PR CMUL</h1>
      <p>โปรดลงชื่อเข้าใช้เพื่อดูรายงานของหน่วยสื่อสารองค์กร</p>
    </div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="username">ชื่อผู้ใช้งาน</label>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน" autocomplete="off" required>
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
      </div>
      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required>
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
          <button type="button" class="toggle-pass" onclick="togglePassword()">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <span class="btn-text">เข้าสู่ระบบ</span>
        <div class="spinner"></div>
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="footer-text">
      CC&amp;PR CMUL<br>
      หน่วยสื่อสารองค์กร สำนักหอสมุด<br>
      มหาวิทยาลัยเชียงใหม่
    </div>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="check-circle">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </div>
  <h2 id="welcomeText"></h2>
  <p id="successMsg">เข้าสู่ระบบสำเร็จ!</p>
  <div class="role-badge" id="roleBadge"></div>
  <button class="go-btn" id="goBtn" onclick="goToDashboard()">เข้าสู่ Dashboard →</button>
  <p class="redirect-msg" id="redirectMsg"></p>
</div>

<script>
  // ★★★ วาง URL ของ Google Apps Script Web App ที่นี่ (URL เดียวกับ dashboard.html) ★★★
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbgS1p5LXE3U7zlq1NdZithqP6pN9X7GcJIkOz9jFYnKP7xZBAbrq2xDeXtnw6w2pE/exec";

  // ===== Account Database (ค่าเริ่มต้น ใช้ fallback เมื่อ Google ไม่ตอบ) =====
  const defaultAccounts = {
    'thanapun.k': { password: 'oat44567', displayName: 'Thanapun K.', role: 'head', roleLabel: 'หัวหน้าฝ่ายประชาสัมพันธ์' },
    'apinanun.s': { password: 'lib44567', displayName: 'Apinanun S.', role: 'admin', roleLabel: 'ผู้ดูแลระบบ' },
    'thian': { password: 'thian44567', displayName: 'Thianrawich', role: 'admin', roleLabel: 'ผู้ดูแลระบบ (Super Admin)' }
  };

  var accounts = defaultAccounts; // ← เริ่มจาก default ก่อน
  var accountsLoaded = false;

  // ★ โหลด accounts จาก Google Sheet ตอนเปิดหน้า
  (async function loadAccountsFromGoogle() {
    try {
      if (SCRIPT_URL.indexOf("ใส่_URL") !== -1) { accountsLoaded = true; return; } // ยังไม่ได้ตั้ง URL
      var res = await fetch(SCRIPT_URL + "?action=getAccounts");
      var data = await res.json();
      if (data.accounts && Object.keys(data.accounts).length > 0) {
        accounts = data.accounts;
        // thian ต้องมีเสมอ
        if (!accounts['thian']) accounts['thian'] = defaultAccounts['thian'];
        console.log("Accounts loaded from Google Sheet:", Object.keys(accounts));
      }
    } catch(e) {
      console.warn("ไม่สามารถโหลดจาก Google Sheet ได้ ใช้ค่าเริ่มต้น:", e.message);
    }
    accountsLoaded = true;
  })();

  let loggedInUser = null;

  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');
    const card = document.querySelector('.login-card');
    errorMsg.classList.remove('show'); errorMsg.textContent = '';
    btn.classList.add('loading');

    // ★ รอให้ accounts โหลดจาก Google Sheet เสร็จก่อน (สูงสุด 5 วินาที)
    var waitCount = 0;
    var waitTimer = setInterval(function() {
      waitCount++;
      if (accountsLoaded || waitCount > 50) { // 50 x 100ms = 5s max
        clearInterval(waitTimer);
        doLogin(username, password, errorMsg, btn, card);
      }
    }, 100);

    return false;
  }

  function doLogin(username, password, errorMsg, btn, card) {
      const account = accounts[username];
      if (account && account.password === password) {
        loggedInUser = {
          username: username,
          displayName: account.displayName,
          role: account.role,
          roleLabel: account.roleLabel,
          loggedInAt: new Date().toISOString()
        };
        localStorage.setItem('cc_pr_user', JSON.stringify(loggedInUser));
        localStorage.setItem('cc_pr_lastActivity', Date.now().toString());

        var overlay = document.getElementById('successOverlay');
        document.getElementById('welcomeText').textContent = 'ยินดีต้อนรับ, ' + account.displayName;
        document.getElementById('roleBadge').textContent = account.roleLabel;
        document.getElementById('roleBadge').className = 'role-badge ' + account.role;
        overlay.classList.add('show');

        var countdown = 5;
        var msgEl = document.getElementById('redirectMsg');
        msgEl.textContent = 'จะเปลี่ยนหน้าอัตโนมัติใน ' + countdown + ' วินาที...';
        var timer = setInterval(function() {
          countdown--;
          if (countdown <= 0) { clearInterval(timer); goToDashboard(); }
          else { msgEl.textContent = 'จะเปลี่ยนหน้าอัตโนมัติใน ' + countdown + ' วินาที...'; }
        }, 1000);
        setTimeout(function() { btn.classList.remove('loading'); }, 2000);
      } else {
        btn.classList.remove('loading');
        errorMsg.textContent = 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง';
        errorMsg.classList.add('show');
        card.classList.add('shake');
        setTimeout(function() { card.classList.remove('shake'); }, 500);
      }
  }

  function goToDashboard() {
    var check = localStorage.getItem('cc_pr_user');
    if (check) { window.location.href = 'dashboard.html'; }
    else { alert('เกิดข้อผิดพลาด กรุณา Login ใหม่อีกครั้ง'); window.location.reload(); }
  }

  (function checkAlreadyLoggedIn() {
    try {
      var raw = localStorage.getItem('cc_pr_user');
      if (raw) {
        var user = JSON.parse(raw);
        var loginTime = new Date(user.loggedInAt).getTime();
        var lastAct = parseInt(localStorage.getItem('cc_pr_lastActivity') || '0', 10);
        var inactiveMs = Date.now() - lastAct;
        // login ไม่เกิน 24 ชม. + ไม่หยุดใช้เกิน 30 นาที
        if (Date.now() - loginTime < 24*60*60*1000 && inactiveMs < 30*60*1000) {
          window.location.href = 'dashboard.html';
        } else {
          localStorage.removeItem('cc_pr_user');
          localStorage.removeItem('cc_pr_lastActivity');
        }
      }
    } catch(e) {}
  })();

  document.getElementById('username').focus();
</script>
</body>
</html>
