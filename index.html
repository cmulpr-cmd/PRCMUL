<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
    (function() {
      // 1. บล็อคการคลิกขวา
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // 2. บล็อคปุ่มลัดที่ใช้เปิด DevTools (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) { e.preventDefault(); return false; }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) { e.preventDefault(); return false; }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) { e.preventDefault(); return false; }
      });

      // 3. ตรวจสอบว่าเคยล็อคอินไว้แล้วหรือไม่ (ถ้ามี Session ให้เด้งไป Dashboard เลย)
      try {
        const raw = localStorage.getItem('cc_pr_user');
        if (raw) {
          const user = JSON.parse(raw);
          const inactive = Date.now() - parseInt(localStorage.getItem('cc_pr_lastActivity') || '0');
          // เช็คว่าอายุ Session ยังไม่เกิน 24 ชม. และไม่ได้ทิ้งหน้าจอไว้นานเกิน 30 นาที
          if (Date.now() - new Date(user.loggedInAt).getTime() < 86400000 && inactive < 30 * 60 * 1000) {
             window.location.href = 'dashboard.html';
          }
        }
      } catch(e) {}
    })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            /* สีม่วงชมพูแบบ graDIENT โทนมืด */
            background: linear-gradient(135deg, #1A0A2E 0%, #3A0D33 50%, #601844 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .login-card {
            /* กรอบของ login ใส Glassmorphism */
            background-color: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 50px 30px;
            width: 100%;
            max-width: 440px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* วงรีด้านบน */
        .blob-top {
            position: absolute;
            top: 25px;
            right: 25px;
            background-color: #D1E8F6;
            color: #1B2A4A;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background-color: #99D6EA;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 15px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .brand h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .brand p {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.5;
            color: #fff;
        }

        form {
            width: 100%;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: transparent;
            color: #fff;
            font-size: 15px;
            font-weight: 400;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.7); }
        input:focus {
            border-color: #ffffff;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
        }

        button:hover { background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); }
        button:active { transform: translateY(1px); }

        .error-msg {
            color: #ff8787;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .note {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #D1E8F6;
            color: #1B2A4A;
            padding: 7px 20px;
            border-radius: 10px;
            font-weight: 400;
            font-size: 12px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            width: auto;
            margin-top: 30px;
        }

        .note div {
            width: 20px; height: 20px; background-color: #ffffff; border-radius: 5px; margin-right: 8px;
            display: flex; justify-content: center; align-items: center; border: 1px solid #1B2A4A;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="login-container">
            <div class="login-card">
                <div class="blob-top">PR</div>
                
                <div class="brand">
                    <div class="brand-logo">PR</div>
                    <h1>ยินดีต้อนรับ</h1>
                    <p>ระบบDashboard <br> การดำเนินงานหน่วยสื่อสารองค์กร</p>
                </div>
                
                <form id="loginForm" onsubmit="return check(event)">
                    <div class="input-group">
                        <input type="text" placeholder="ชื่อผู้ใช้" name="uname" id="uname" required>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" placeholder="รหัสผ่าน" name="psw" id="psw" required>
                    </div>
                    
                    <button type="submit">เข้าสู่ระบบ</button>
                    <div id="errorMsg" class="error-msg">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</div>
                </form>
                
                <div class="note">
                    <div><img src="https://img.icons8.com/material-sharp/24/1B2A4A/office-building.png" width="12" height="12"></div>
                    สำนักหอสมุด มหาวิทยาลัยเชียงใหม่
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function check(event) {
            if(event) event.preventDefault();
            
            var uname = document.getElementById("uname").value;
            var psw = document.getElementById("psw").value;
            var errorMsg = document.getElementById("errorMsg");
            
            // คุณสามารถเปลี่ยนรหัสผ่านตรงนี้ได้ตามต้องการครับ
            if (uname === "admin" && psw === "password") {
                errorMsg.style.display = "none";
                
                // สร้าง Session Storage เพื่อให้หน้า Dashboard และ Report รู้ว่าล็อคอินแล้ว (สำคัญมาก)
                const userObj = {
                    username: uname,
                    displayName: 'ผู้ปฏิบัติงาน',
                    role: 'admin',
                    roleLabel: 'หน่วยสื่อสารองค์กร',
                    loggedInAt: new Date().toISOString()
                };
                localStorage.setItem('cc_pr_user', JSON.stringify(userObj));
                localStorage.setItem('cc_pr_lastActivity', Date.now().toString());
                
                // ส่งไปยังหน้า Dashboard
                window.location.href = "dashboard.html"; 
            } else {
                errorMsg.style.display = "block"; // แสดงข้อความ Error สีแดง
            }
            return false;
        }
    </script>
</body>
</html>
